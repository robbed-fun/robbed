  /internal/flow/{address}:
    get:
      tags: [internal]
      operationId: internalFlow
      summary: Per-token flow quality — organic %, cluster stats, bot-flag counts (M2-13; Gate G-A.1)
      description: >-
        D-4 (spec §12.54) / api.md §3.7. Read-only §8.5 telemetry over the
        indexer's `token_flow_stats` + `address_flags` side tables. `organic` is
        EXACTLY the shared organicFlowSchema object the public Trust panel gets
        (same projection) — the holder estimate is a RANGE, never a point value
        (spec §5.2). Advisory only — never gates chain state or listing
        (spec §8.4/§8.5). Admin-SIWE-gated; not consumed by the public frontend.
      security:
        - adminSession: []
      parameters:
        - $ref: "#/components/parameters/TokenAddress"
      responses:
        "200":
          description: Flow-quality summary for the token
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    type: object
                    required: [token, organic, flagged]
                    properties:
                      token: { $ref: "#/components/schemas/Address" }
                      organic:
                        oneOf:
                          - $ref: "#/components/schemas/OrganicFlow"
                          - type: "null"
                      flagged:
                        type: object
                        required: [holders, clusters, byFlag]
                        description: §8.5 advisory summary over the token's current holders
                        properties:
                          holders:
                            type: integer
                            minimum: 0
                            description: Holders carrying at least one bot flag
                          clusters:
                            type: integer
                            minimum: 0
                            description: Distinct funder clusters among flagged holders
                          byFlag:
                            type: object
                            required: [farm, sniper, programmatic, wash, arb_exit]
                            description: Per-flag holder counts (shared BotFlag vocabulary)
                            properties:
                              farm: { type: integer, minimum: 0 }
                              sniper: { type: integer, minimum: 0 }
                              programmatic: { type: integer, minimum: 0 }
                              wash: { type: integer, minimum: 0 }
                              arb_exit: { type: integer, minimum: 0 }
                  error: { type: "null" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /internal/competitor-snapshots:
    get:
      tags: [internal]
      operationId: internalCompetitorSnapshots
      summary: Competitor traction snapshots, paged newest-first (M2-14; Gate G-A.2)
      description: >-
        D-4 (spec §12.54) / api.md §3.7. Reads the indexer's
        `competitor_snapshots` table (spec §8.5.3 weekly hood.fun traction).
        Rows are the shared CompetitorSnapshotRow VERBATIM — `source` +
        `captured_at` are NOT NULL by table constraint and ALWAYS present
        (spec §2: never a hardcoded/fabricated metric). While the snapshot
        source is unconfigured the table is empty and this returns an empty
        page. Admin-SIWE-gated; read-only.
      security:
        - adminSession: []
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: "Snapshots, newest first (captured_at DESC, source DESC keyset)"
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    type: object
                    required: [snapshots, nextCursor]
                    properties:
                      snapshots:
                        type: array
                        items: { $ref: "#/components/schemas/CompetitorSnapshot" }
                      nextCursor: { $ref: "#/components/schemas/NextCursor" }
                  error: { type: "null" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimited" }

components:
  securitySchemes:
    adminSession:
      type: apiKey
      in: cookie
      name: robbed_admin_session
      description: |
        SIWE (EIP-4361) against a config address allowlist → short-lived signed session
        cookie (HttpOnly, SameSite=strict, 12h). Mutations additionally require the
        `X-CSRF-Token` header (api.md §6.2). Cookie name is implementation-defined.
    userSession:
      type: apiKey
      in: cookie
      name: robbed_user_session
      description: |
        User SIWE (EIP-4361) sign-in — NO address allowlist (any valid signer) → signed
        session cookie (HttpOnly, SameSite=Lax). Reuses the admin SIWE machinery with a
        null allowlist (spec §12.63b). CSRF defense is the SameSite=Lax cookie (no
        double-submit token). Cookie name is implementation-defined.

  parameters:
    Cursor:
      name: cursor
      in: query
      schema: { type: string }
      description: Opaque cursor from a previous response (api.md §2)
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
    TokenAddress:
      name: address
      in: path
      required: true
      schema: { $ref: "#/components/schemas/Address" }
    AdminTokenAddress:
      name: tokenAddress
      in: path
      required: true
      schema: { $ref: "#/components/schemas/Address" }
    CsrfToken:
      name: X-CSRF-Token
      in: header
      required: true
      schema: { type: string }
      description: CSRF token bound to the admin session (api.md §6.2)

  responses:
    BadRequest:
      description: Validation failure
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    NotFound:
      description: Unknown resource
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    Unauthorized:
      description: Missing/invalid admin session (SIWE, api.md §6.2)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    RateLimited:
      description: Rate limit exceeded (api.md §6.3)
      headers:
        Retry-After:
          description: Seconds until the sliding window admits the client again
          schema: { type: integer, minimum: 0 }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  schemas:
    # ── Scalars ──────────────────────────────────────────────────────────────
    Address:
      type: string
      pattern: "^0x[0-9a-fA-F]{40}$"
      description: EVM address (responses use lowercase)
    Hex32:
      type: string
      pattern: "^0x[0-9a-f]{64}$"
      description: 0x-prefixed 32-byte hex (tx hash / keccak256)
    DecimalString:
      type: string
      pattern: "^[0-9]+$"
      description: uint256 as decimal string (api.md §2 — exceeds JS safe integer)
    NextCursor:
      oneOf:
        - type: string
        - type: "null"
      description: Opaque cursor; null when exhausted
    ConfirmationState:
      type: string
      enum: [soft_confirmed, posted_to_l1, finalized]
      description: Spec §2.1 — soft-confirmed → posted-to-L1 → finalized (monotonic)
    CandleInterval:
      type: string
      enum: ["1s", "15s", "1m", "5m", "15m", "1h"]
      description: Ratified interval set (spec §12.17)
    Venue:
      type: string
      enum: [curve, v3]
    ModerationVisibility:
      type: string
      enum: [visible, pending_review, hidden]
    TokenStatus:
      type: string
      enum: [curve, graduating, graduated]
      description: Derived (indexer.md §3.2) — drives the venue pill / trade-widget engine
    MetadataVerificationStatus:
      type: string
      enum: [match, mismatch, unfetched]
    SortDir:
      type: string
      enum: [asc, desc]
      description: Sort direction (spec §12.59; mirrors packages/shared sortDirSchema)
    TradeSortField:
      type: string
      enum: [age, side, trader, amount, price]
      description: >-
        Closed trades-sort allowlist (§12.59; packages/shared TRADE_SORT_FIELDS). Mapped API-side to a
        fixed column (age→block_timestamp, side→is_buy, trader→trader, amount→eth_amount, price→price_eth);
        a value outside this enum is 400 — the ORDER BY security boundary.
    HolderSortField:
      type: string
      enum: [rank, address, label, amount, percent]
      description: >-
        Closed holders-sort allowlist (§12.59; packages/shared HOLDER_SORT_FIELDS). Mapped API-side to a
        fixed column (rank/amount/percent→balance, address→holder, label→role/flag CASE); a value outside
        this enum is 400 — the ORDER BY security boundary.

    # ── Envelope ─────────────────────────────────────────────────────────────
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [oversized, unsupported_type, decode_failed, rate_limited, not_found, invalid_request, unauthorized, upstream_unavailable, conflict]
          description: >-
            Closed set — single source is packages/shared errorCodeSchema
            (api-types.ts). A new code is added there and here in lockstep.
            `upstream_unavailable` = unexpected 500 / readyz-503 dependency-down;
            `conflict` = request conflicts with stored state (e.g. unknown imageHash).
        message: { type: string }
    ErrorEnvelope:
      type: object
      required: [data, error]
      properties:
        data: { type: "null" }
        error: { $ref: "#/components/schemas/Error" }

    # ── Value objects ────────────────────────────────────────────────────────
    UsdValue:
      type: object
      required: [usd, ethUsd, asOf]
      properties:
        usd: { type: string }
        ethUsd: { type: string }
        asOf: { type: string, format: date-time }
        stale:
          type: boolean
          const: true
          description: Present iff the ETH/USD snapshot is older than 5 minutes (api.md §2)
      description: Computed at request time from eth_usd_snapshots — never a constant (spec §2)

    ModerationInfo:
      type: object
      required: [visibility, impersonationFlag]
      properties:
        visibility: { $ref: "#/components/schemas/ModerationVisibility" }
        impersonationFlag: { type: boolean }
        impersonationTicker:
          type: string
          description: Present on TokenDetail when impersonation-flagged (api.md §3.4)

    # ── Core DTOs (mirror packages/shared/src/api-types.ts) ─────────────────
    TokenCard:
      type: object
      required:
        [address, name, ticker, imageUrl, creator, createdAt, priceEth, mcap,
         progressPct, change24hPct, volume24h, graduated, status,
         confirmationState, moderation]
      properties:
        address: { $ref: "#/components/schemas/Address" }
        name: { type: string }
        ticker: { type: string }
        imageUrl:
          oneOf: [{ type: string }, { type: "null" }]
          description: Null until metadata JSON fetched (indexer.md §3.1)
        creator: { $ref: "#/components/schemas/Address" }
        createdAt: { type: integer, description: "block timestamp, unix seconds" }
        priceEth:
          oneOf: [{ type: number }, { type: "null" }]
          description: Display-only float; null before first trade
        mcap: { $ref: "#/components/schemas/UsdValue" }
        mcapEth:
          allOf: [{ $ref: "#/components/schemas/DecimalString" }]
          description: >-
            Native ETH market cap, wei decimal string (spec §2 ETH-first; mcapEth refinement ratified 2026-07-10).
            ETH-first display source (§2) — USD mcap derives from it. Optional /
            additive: absent until the indexer materializes it; not in `required`.
        progressPct: { type: number, description: real_eth_reserves / graduation_eth }
        change24hPct:
          oneOf: [{ type: number }, { type: "null" }]
        volume24h: { $ref: "#/components/schemas/DecimalString" }
        graduated: { type: boolean }
        status: { $ref: "#/components/schemas/TokenStatus" }
        confirmationState: { $ref: "#/components/schemas/ConfirmationState" }
        moderation: { $ref: "#/components/schemas/ModerationInfo" }

    TrustPanel:
      type: object
      required: [metadataVerification, lpCopy, feePolicy, organic]
      description: Trust panel payload (spec §5.2) — all derived, none hardcoded
      properties:
        metadataVerification:
          type: object
          required: [status, onchainHash]
          properties:
            status: { $ref: "#/components/schemas/MetadataVerificationStatus" }
            onchainHash: { $ref: "#/components/schemas/Hex32" }
            computedHash: { $ref: "#/components/schemas/Hex32" }
            verifiedAt: { type: string, format: date-time }
        lpCopy:
          type: string
          const: "LP principal permanently locked; trading fees claimable by treasury."
          description: The exact canonical sentence (spec §12.14; CLAUDE.md hard rule) — from packages/shared constants
        feePolicy:
          type: object
          required: [tradeFeeBps, creatorFeeBps]
          properties:
            tradeFeeBps: { type: integer, minimum: 0, maximum: 200 }
            creatorFeeBps:
              type: integer
              minimum: 0
              description: Present from day 1, value 0 in v1 (spec §7)
        organic:
          description: >-
            v1.2 organic-flow metrics (spec §5.2/§8.5) from indexer
            token_flow_stats — advisory/heuristic, never gates chain state.
            null until the stats job first computes.
          oneOf:
            - $ref: "#/components/schemas/OrganicFlow"
            - type: "null"

    OrganicFlow:
      type: object
      required: [holderPctLow, holderPctHigh, volumePct, flaggedClusterVolPct24h, methodology, updatedAt]
      description: >-
        Shared organicFlowSchema (packages/shared api-types.ts) — the §5.2/§8.5
        organic-flow object served both on the public Trust panel
        (TrustPanel.organic) and the internal /internal/flow/{address} endpoint.
        Organic-holder estimate is a RANGE, never a point value (spec §5.2).
        Advisory/heuristic — never gates chain state (spec §8.4/§8.5).
      properties:
        holderPctLow: { type: number }
        holderPctHigh: { type: number }
        volumePct:
          type: number
          description: "organic-volume % (wash-flagged volume excluded, §8.5)"
        flaggedClusterVolPct24h:
          type: number
          description: "flagged-cluster share of 24h curve volume"
        methodology:
          type: string
          description: "tooltip source, e.g. heuristic — see §8.5"
        updatedAt:
          oneOf: [{ type: string, format: date-time }, { type: "null" }]

    CompetitorSnapshot:
      type: object
      required: [source, captured_at, tokens_per_day, graduations, visible_volume_eth]
      description: >-
        Shared CompetitorSnapshotRow VERBATIM (packages/shared db-rows.ts;
        indexer.md §8.5.3) — snake_case row-as-wire, deliberate for the internal
        surface (api.md §3.7). Every row carries its source + capture timestamp
        (spec §2 — never a hardcoded metric).
      properties:
        source:
          type: string
          description: "Stable source label, e.g. dune:query/1234567 — never fabricated"
        captured_at: { type: string, format: date-time }
        tokens_per_day: { type: integer, minimum: 0 }
        graduations: { type: integer, minimum: 0 }
        visible_volume_eth:
          allOf: [{ $ref: "#/components/schemas/DecimalString" }]
          description: ETH-wei decimal string (no float precision loss)

    TokenDetail:
      allOf:
        - $ref: "#/components/schemas/TokenCard"
        - type: object
          required:
            [description, links, curveAddress, supply, reserves, graduation,
             trust, creator, moderation]
          properties:
            description:
              oneOf: [{ type: string }, { type: "null" }]
            links:
              oneOf:
                - type: object
                  properties:
                    website: { type: string }
                    x: { type: string }
                    telegram: { type: string }
                - type: "null"
            curveAddress: { $ref: "#/components/schemas/Address" }
            v3PoolAddress: { $ref: "#/components/schemas/Address" }
            graduatedAt: { type: integer }
            lpTokenId:
              allOf: [{ $ref: "#/components/schemas/DecimalString" }]
              description: LP NFT tokenId from the Graduated event (graduations.lp_token_id); present iff graduated — drives LPFeeVault.collect(tokenId)
            supply:
              type: object
              required: [total, curveHeld, lpTranche]
              properties:
                total: { $ref: "#/components/schemas/DecimalString" }
                curveHeld: { $ref: "#/components/schemas/DecimalString" }
                lpTranche: { $ref: "#/components/schemas/DecimalString" }
            reserves:
              type: object
              required: [virtualEth, virtualToken, realEth, realToken]
              description: Live curve state (Trust panel, spec §5.2)
              properties:
                virtualEth: { $ref: "#/components/schemas/DecimalString" }
                virtualToken: { $ref: "#/components/schemas/DecimalString" }
                realEth: { $ref: "#/components/schemas/DecimalString" }
                realToken: { $ref: "#/components/schemas/DecimalString" }
            graduation:
              type: object
              required: [thresholdEth, progressPct]
              properties:
                thresholdEth: { $ref: "#/components/schemas/DecimalString" }
                progressPct: { type: number }
            trust: { $ref: "#/components/schemas/TrustPanel" }
            creator:
              type: object
              required: [address, tokensCreated]
              description: Creator profile — supersedes the card's plain creator address (RATIFIED, findings X-13; address is inside the object)
              properties:
                address: { $ref: "#/components/schemas/Address" }
                tokensCreated: { type: integer, minimum: 0 }
            holderCount:
              type: integer
              minimum: 0
              description: Distinct holder count (tokens.holder_count, indexer.md §3.6) — the TokenHeader "Holders" stat (§5.2). Additive/optional (2026-07-12); restores the aggregate the /holders {items,nextCursor} migration dropped.

    TradeRow:
      type: object
      required:
        [id, token, trader, venue, isBuy, ethAmount, tokenAmount, feeEth,
         priceEth, blockNumber, blockTimestamp, txHash, logIndex, confirmationState]
      description: Unified curve Trade + V3 Swap projection (indexer.md §3.2)
      properties:
        id: { type: string, description: "`{txHash}-{logIndex}`" }
        token: { $ref: "#/components/schemas/Address" }
        trader:
          allOf: [{ $ref: "#/components/schemas/Address" }]
          description: For venue=v3 this is the swap recipient, not necessarily the EOA (spec §12.16)
        venue: { $ref: "#/components/schemas/Venue" }
        isBuy: { type: boolean }
        ethAmount:
          allOf: [{ $ref: "#/components/schemas/DecimalString" }]
          description: GROSS ETH leg for curve trades (fee included; net = ethAmount − feeEth, spec §12.15)
        tokenAmount: { $ref: "#/components/schemas/DecimalString" }
        feeEth:
          allOf: [{ $ref: "#/components/schemas/DecimalString" }]
          description: "\"0\" for v3 rows — fee lives in the pool; Collect tracks it"
        priceEth: { type: number, description: "ETH per token, display-only float" }
        blockNumber: { type: integer, minimum: 0 }
        blockTimestamp: { type: integer, minimum: 0 }
        txHash: { $ref: "#/components/schemas/Hex32" }
        logIndex: { type: integer, minimum: 0 }
        confirmationState: { $ref: "#/components/schemas/ConfirmationState" }

    Candle:
      type: object
      required: [bucketStart, open, high, low, close, volumeEth, volumeToken, tradeCount]
      properties:
        bucketStart: { type: integer, minimum: 0, description: "unix seconds, floored to interval" }
        open: { type: number }
        high: { type: number }
        low: { type: number }
        close: { type: number }
        volumeEth: { $ref: "#/components/schemas/DecimalString" }
        volumeToken: { $ref: "#/components/schemas/DecimalString" }
        tradeCount: { type: integer, minimum: 0 }

    HolderRow:
      type: object
      required: [address, balance, pct, flags]
      properties:
        address: { $ref: "#/components/schemas/Address" }
        balance: { $ref: "#/components/schemas/DecimalString" }
        pct: { type: number }
        rank:
          type: integer
          minimum: 1
          description: >-
            1-based balance-descending rank within the token (derived at read time,
            not stored). Additive + optional (mirrors packages/shared holderRowSchema,
            2026-07-12): lets the sortable holders table show a stable rank column
            under any sort. Absent until an endpoint populates it.
        flags:
          type: array
          items:
            type: string
            enum: [creator, curve, lp_pool, vault]
        botFlags:
          type: array
          description: v1.2 advisory §8.5 labels (indexer address_flags); absent when no bot flag
          items:
            type: string
            enum: [farm, sniper, programmatic, wash, arb_exit]
        clusterId:
          type: string
          description: Shared gas-funder cluster id → grouped on the holder list (spec §5.2)

    # ── Portfolio DTOs (spec §5.4; mirror packages/shared api-types.ts) ──────
    EthPnlRange:
      type: object
      required: [low, high, confidence]
      description: >-
        Best-effort signed ETH-value range (wei) for PnL where the cost basis is
        imprecise (§5.2 — no false precision). `low`/`high` are SIGNED decimal
        strings (may be negative); `low ≤ high` (compared as bigint). A precisely-
        known value sets `low === high` with `confidence: exact`. The whole field
        is nullable at each DTO site (null when NO cost basis exists at all).
      properties:
        low:
          type: string
          pattern: "^-?[0-9]+$"
        high:
          type: string
          pattern: "^-?[0-9]+$"
        confidence:
          type: string
          enum: [exact, estimated]
    TokenRef:
      type: object
      required: [address, name, ticker, imageUrl, graduated, status]
      description: Compact token reference for portfolio lists — `.pick` of TokenCard (anti-drift)
      properties:
        address: { $ref: "#/components/schemas/Address" }
        name: { type: string }
        ticker: { type: string }
        imageUrl:
          oneOf: [{ type: string }, { type: "null" }]
        graduated: { type: boolean }
        status: { $ref: "#/components/schemas/TokenStatus" }
    PortfolioHolding:
      type: object
      required: [token, balance, priceEth, valueEth, value, unrealizedPnl]
      description: >-
        HOLDINGS row — `balances ⋈ tokens` (BalanceRow IS the holding). `balance`
        is Transfer-truth; `priceEth`/`valueEth`/`value` are computed READ-TIME via
        curve-quote and null when the token has never traded; `unrealizedPnl` is
        null when there is no cost basis (§5.2).
      properties:
        token: { $ref: "#/components/schemas/TokenRef" }
        balance: { $ref: "#/components/schemas/DecimalString" }
        priceEth:
          oneOf: [{ type: number }, { type: "null" }]
          description: Display spot price, ETH float; null before the token's first trade
        valueEth:
          oneOf: [{ $ref: "#/components/schemas/DecimalString" }, { type: "null" }]
          description: Liquidation value, wei; null when unpriceable
        value:
          oneOf: [{ $ref: "#/components/schemas/UsdValue" }, { type: "null" }]
          description: USD mirror of valueEth (derived, §2); null when unpriceable
        unrealizedPnl:
          oneOf: [{ $ref: "#/components/schemas/EthPnlRange" }, { type: "null" }]
    PortfolioSummary:
      type: object
      required:
        [address, firstSeenAt, tradeCount, tokensCreated, walletEthBalance,
         totalValueEth, totalValue, pnlAllTime]
      description: >-
        Per-address aggregate roll-up (TOTAL VALUE / LOOT ALL-TIME / WALLET ETH +
        first-seen · trades). Carries NO confirmationState (aggregate, not a single
        event-derived object). `walletEthBalance` is a live RPC read (chain truth);
        `pnlAllTime` = realized + unrealized best-effort range, null when no cost basis.
      properties:
        address: { $ref: "#/components/schemas/Address" }
        firstSeenAt:
          oneOf: [{ type: integer, minimum: 0 }, { type: "null" }]
          description: Earliest Transfer touching this address (unix sec); null if never seen
        tradeCount: { type: integer, minimum: 0 }
        tokensCreated: { type: integer, minimum: 0 }
        walletEthBalance:
          allOf: [{ $ref: "#/components/schemas/DecimalString" }]
          description: Live native ETH balance, wei — RPC read (chain truth, exact)
        totalValueEth:
          allOf: [{ $ref: "#/components/schemas/DecimalString" }]
          description: Sum of priceable holdings' value, wei; "0" when nothing is priceable
        totalValue: { $ref: "#/components/schemas/UsdValue" }
        pnlAllTime:
          oneOf: [{ $ref: "#/components/schemas/EthPnlRange" }, { type: "null" }]
          description: All-time PnL ("LOOT") = realized + unrealized; null when no cost basis (§5.2)

    CreatorClaimable:
      type: object
      required: [creator, vault, claimableEth, claimable, totalAccruedEth, totalClaimedEth, asOf]
      description: >-
        Creator-fee claim surface (spec §7 / §12.63; mirrors packages/shared
        creatorClaimableSchema). `claimableEth` = live CreatorVault.balanceOf
        (authoritative), else accrued − claimed mirror. Aggregate roll-up ⇒ no
        confirmationState.
      properties:
        creator: { $ref: "#/components/schemas/Address" }
        vault:
          allOf: [{ $ref: "#/components/schemas/Address" }]
          description: The CreatorVault the balance lives in
        claimableEth:
          allOf: [{ $ref: "#/components/schemas/DecimalString" }]
          description: Live balanceOf(creator), wei — the authoritative claimable value
        claimable: { $ref: "#/components/schemas/UsdValue" }
        totalAccruedEth:
          allOf: [{ $ref: "#/components/schemas/DecimalString" }]
          description: Lifetime accrued (Σ CreatorFeesSwept), wei
        totalClaimedEth:
          allOf: [{ $ref: "#/components/schemas/DecimalString" }]
          description: Lifetime claimed (Σ CreatorFeeClaimed), wei
        asOf: { type: string, format: date-time, description: Timestamp of the live balanceOf read }

    FeesResponse:
      type: object
      required: [collected, uncollected]
      properties:
        collected:
          type: object
          required: [token, weth, byCollection]
          properties:
            token: { $ref: "#/components/schemas/DecimalString" }
            weth: { $ref: "#/components/schemas/DecimalString" }
            byCollection:
              type: array
              items:
                type: object
                required: [id, amountToken, amountWeth, recipient, blockTimestamp, txHash, confirmationState]
                properties:
                  id: { type: string }
                  amountToken: { $ref: "#/components/schemas/DecimalString" }
                  amountWeth: { $ref: "#/components/schemas/DecimalString" }
                  recipient: { $ref: "#/components/schemas/Address" }
                  blockTimestamp: { type: integer, minimum: 0 }
                  txHash: { $ref: "#/components/schemas/Hex32" }
                  confirmationState: { $ref: "#/components/schemas/ConfirmationState" }
        uncollected:
          type: object
          required: [token, weth, asOf]
          properties:
            token: { $ref: "#/components/schemas/DecimalString" }
            weth: { $ref: "#/components/schemas/DecimalString" }
            asOf: { type: string, format: date-time, description: "live NPM tokensOwed read, cached 60s" }

    StatsResponse:
      type: object
      required:
        [tokensLaunched, graduations, volume24hEth, volume24h,
         treasuryFeesCollectedWeth, treasuryFeesCollected]
      properties:
        tokensLaunched: { type: integer, minimum: 0 }
        graduations: { type: integer, minimum: 0 }
        volume24hEth: { $ref: "#/components/schemas/DecimalString" }
        volume24h: { $ref: "#/components/schemas/UsdValue" }
        treasuryFeesCollectedWeth: { $ref: "#/components/schemas/DecimalString" }
        treasuryFeesCollected: { $ref: "#/components/schemas/UsdValue" }

    ConfirmationsResponse:
      type: object
      required: [safeBlock, finalizedBlock, latestBlock, updatedAt]
      properties:
        safeBlock: { type: integer, minimum: 0 }
        finalizedBlock: { type: integer, minimum: 0 }
        latestBlock: { type: integer, minimum: 0 }
        updatedAt: { type: string, format: date-time }

    EthUsdResponse:
      type: object
      required: [price, source, asOf]
      properties:
        price: { type: number }
        source: { type: string, description: "e.g. 'chainlink:4663', 'defillama' — config-driven (spec §13)" }
        asOf: { type: string, format: date-time }

    ReadyzResponse:
      type: object
      required: [data, error]
      description: >-
        Readiness envelope for the 200 arm of /v1/readyz (`ok: true`, all checks
        passing). The 503 arm is the standard ErrorEnvelope (api.md §3.5
        normative, 2026-07-12) — not this shape.
      properties:
        data:
          type: object
          required: [ok, checks]
          properties:
            ok: { type: boolean, const: true }
            checks:
              type: object
              required: [db, redis, r2]
              properties:
                db: { type: boolean }
                redis: { type: boolean }
                r2: { type: boolean }
        error: { type: "null" }

    # ── Launch flow ──────────────────────────────────────────────────────────
    UploadImageResponse:
      type: object
      required: [imageUrl, imageHash, width, height, bytes]
      properties:
        imageUrl: { type: string }
        imageHash:
          allOf: [{ $ref: "#/components/schemas/Hex32" }]
          description: keccak256 of the RE-ENCODED bytes — goes into metadata JSON (spec §8.3)
        width: { type: integer, minimum: 1 }
        height: { type: integer, minimum: 1 }
        bytes: { type: integer, minimum: 1 }

    MetadataRequest:
      type: object
      required: [name, ticker, imageUrl, imageHash]
      description: >-
        name/ticker limits are UTF-8 BYTE limits (spec §12.30) matching the
        on-chain gate bytes(x).length — name ≤ 32 bytes, ticker ≤ 10 bytes —
        server-enforced by packages/shared byteBoundedString. JSON-Schema
        maxLength counts Unicode code points, so it CANNOT express a byte bound
        exactly; the maxLength values below are safe upper bounds (documentary),
        and the authoritative gate is the server-side byte-length refinement.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 32
          description: ≤ 32 UTF-8 BYTES (authoritative), server-enforced (§12.30)
        ticker:
          type: string
          minLength: 1
          maxLength: 10
          description: ≤ 10 UTF-8 BYTES (authoritative), server-enforced (§12.30)
        description: { type: string, maxLength: 500 }
        links:
          type: object
          properties:
            website: { type: string, format: uri }
            x: { type: string, format: uri }
            telegram: { type: string, format: uri }
        imageUrl: { type: string, format: uri, description: must be our CDN origin }
        imageHash:
          allOf: [{ $ref: "#/components/schemas/Hex32" }]
          description: must match an object the upload endpoint produced (R2 existence check)

    MetadataResponse:
      type: object
      required: [metadataHash, metadataUri, canonicalJson]
      properties:
        metadataHash:
          allOf: [{ $ref: "#/components/schemas/Hex32" }]
          description: keccak256 of the canonical bytes — the client MUST re-verify with the shared canonicalizer before signing (spec §12.19)
        metadataUri: { type: string, description: "R2 URL metadata/{hash}.json (content-addressed)" }
        canonicalJson: { type: string, description: the exact canonical JSON text that was hashed and stored }

    # ── Admin ────────────────────────────────────────────────────────────────
    AdminVisibilityRequest:
      type: object
      required: [visibility, reason]
      properties:
        visibility:
          type: string
          enum: [visible, hidden]
          description: Listing visibility ONLY — no chain-state capability exists (spec §8.4)
        reason: { type: string, minLength: 1 }

    AdminImpersonationRequest:
      type: object
      required: [flagged, reason]
      properties:
        flagged: { type: boolean }
        ticker: { type: string }
        reason: { type: string, minLength: 1 }

    ModerationQueueItem:
      type: object
      required:
        [tokenAddress, name, ticker, imageUrl, metadataUri, nsfwScore, csamFlag,
         impersonationFlag, impersonationTicker, visibility, updatedAt]
      properties:
        tokenAddress: { $ref: "#/components/schemas/Address" }
        name: { type: string }
        ticker: { type: string }
        imageUrl:
          oneOf: [{ type: string }, { type: "null" }]
        metadataUri:
          oneOf: [{ type: string }, { type: "null" }]
        nsfwScore:
          oneOf: [{ type: number }, { type: "null" }]
        csamFlag: { type: boolean }
        impersonationFlag: { type: boolean }
        impersonationTicker:
          oneOf: [{ type: string }, { type: "null" }]
        visibility: { $ref: "#/components/schemas/ModerationVisibility" }
        updatedAt: { type: string, format: date-time }

    AuditLogEntry:
      type: object
      required: [actor, action, target, reason, ts]
      properties:
        actor: { type: string, description: admin identity (SIWE address) }
        action: { type: string }
        target: { type: string }
        reason:
          oneOf: [{ type: string }, { type: "null" }]
        ts: { type: string, format: date-time }

    # ── SIWE session lifecycle (mints the adminSession scheme) ─────────────────
    AdminNonceResponse:
      type: object
      required: [nonce]
      properties:
        nonce:
          type: string
          description: Single-use alphanumeric nonce for the EIP-4361 message (Redis, 10-min TTL)
    AdminLoginRequest:
      type: object
      required: [message, signature]
      properties:
        message:
          type: string
          minLength: 1
          description: The EIP-4361 (SIWE) message text, including the issued nonce
        signature:
          type: string
          pattern: "^0x[0-9a-fA-F]+$"
          description: EOA (ECDSA) signature over `message` — EIP-1271 not supported in v1
    AdminLoginResponse:
      type: object
      required: [address, csrfToken]
      properties:
        address:
          allOf: [{ $ref: "#/components/schemas/Address" }]
          description: The authenticated admin address (recovered + allowlist-checked)
        csrfToken:
          type: string
          description: Send as `X-CSRF-Token` on every admin mutation (bound to the session)
    UserLoginResponse:
      type: object
      required: [address]
      properties:
        address:
          allOf: [{ $ref: "#/components/schemas/Address" }]
          description: The authenticated signer address (recovered; no allowlist — spec §12.63b)

    # ── Comments (off-chain, SIWE-authored; spec §12.63b — mirror @robbed/shared) ─
    Comment:
      type: object
      required: [id, tokenAddress, author, body, createdAt, moderationStatus]
      description: >-
        Persisted per-token comment (packages/shared commentSchema). Flat; no
        threading, no edit — a "delete" is a moderation-hide (moderationStatus →
        hidden), never a physical delete.
      properties:
        id: { type: string, description: bigserial id (keyset tiebreak) }
        tokenAddress: { $ref: "#/components/schemas/Address" }
        author:
          allOf: [{ $ref: "#/components/schemas/Address" }]
          description: SIWE-authenticated poster — never client-supplied
        body: { type: string, minLength: 1, maxLength: 500, description: COMMENT_BODY_MAX = 500 }
        createdAt: { type: integer, minimum: 0, description: server insert time, unix seconds }
        moderationStatus: { $ref: "#/components/schemas/ModerationVisibility" }
    PostCommentRequest:
      type: object
      required: [body]
      description: >-
        POST body carries ONLY `body` (packages/shared postCommentRequestSchema).
        `author` comes from the session and `tokenAddress` from the path; any extra
        key is stripped, never trusted.
      properties:
        body: { type: string, minLength: 1, maxLength: 500 }
