openapi: 3.1.0
info:
  title: ROBBED_ API
  version: 1.0.0
  description: |
    Frozen HTTP contract for `apps/api` (Hono on Bun) — transcribed from
    `docs/developers/api.md` (Design v1.0) and `docs/spec.md` §2/§2.1/§5/§8/§12.
    M2 implements this document; M3 (frontend) consumes it. Response DTO shapes
    are the zod schemas in `packages/shared/src/api-types.ts` — the schemas
    below mirror them and MUST NOT drift (shared package is authoritative).

    Conventions (api.md §2):
    - Envelope: `{ data, error: null }` on success, `{ data: null, error: { code, message } }` on failure.
    - All uint256 values are decimal strings.
    - Every event-derived object carries `confirmationState` (spec §2.1): `soft_confirmed | posted_to_l1 | finalized`.
    - Every USD-derived field is `{ usd, ethUsd, asOf }` computed at request time from `eth_usd_snapshots`
      (never a constant, spec §2); `stale: true` added when the snapshot is older than 5 minutes.
    - List endpoints use cursor pagination (`?cursor=&limit=`, limit ≤ 100, default 50).
    - Listing-gated endpoints (`/tokens` list, `/search`) exclude `visibility = 'hidden'`;
      direct `/tokens/{address}` returns hidden tokens with the moderation flag, never 404 (spec §12.21).
    - Rate limiting (api.md §6.3): 429 with `Retry-After`. Defaults: uploads 10/h + 3/min per IP,
      metadata 20/h per IP, search 60/min per IP, reads 300/min per IP, admin 60/min per session.
    - No API path may ever mutate or depend on mutating chain state (spec §8.4).
  license:
    name: MIT
servers:
  - url: /
# Default: public, no auth (api.md §6.1 — reads + upload/metadata are anonymous by design).
# Admin operations override with the adminSession scheme (api.md §6.2).
security: []
tags:
  - name: launch
    description: Launch flow — image upload + canonical metadata (spec §5.3, §8.3, §12.19)
  - name: tokens
    description: Read API over indexer tables (spec §5.1, §5.2)
  - name: portfolio
    description: Per-address portfolio — summary + holdings/activity/created (spec §5.4)
  - name: search
    description: pg_trgm search over name / ticker / contract / creator (spec §5.1)
  - name: meta
    description: Confirmations, ETH/USD, health (spec §2, §2.1)
  - name: auth
    description: User SIWE sign-in — session cookie for off-chain comment authoring (spec §12.63b)
  - name: admin
    description: Moderation admin — SIWE session auth, listing visibility only (spec §8.4)
  - name: internal
    description: >-
      Internal ops dashboard — read-only, admin-SIWE-gated (D-4, spec §12.54;
      api.md §3.7). Feeds Gate G-A.1/G-A.2 (spec §14). Advisory-only (spec §8.4/§8.5):
      never gates chain state, listing, or any user path. Not consumed by the public frontend.

paths:
  /v1/uploads/image:
    post:
      tags: [launch]
      operationId: uploadImage
      summary: Upload a token image (API-mediated — spec §12.19; MIME sniff, ≤4MB, re-encode before R2)
      description: |
        Multipart upload. Pipeline (api.md §3.1): magic-byte MIME sniff (png|jpeg|webp|gif) →
        decode + re-encode (strips EXIF/polyglots; canonical image is the RE-ENCODED object) →
        keccak256 of re-encoded bytes = `imageHash` → content-addressed PUT to R2
        `images/{keccak256}.webp` → async auto-moderation enqueued. Never a browser-direct presign.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
                  description: Image file, ≤ 4MB (spec §5.3)
      responses:
        "200":
          description: Re-encoded and stored
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data: { $ref: "#/components/schemas/UploadImageResponse" }
                  error: { type: "null" }
        "400":
          description: "`oversized` | `unsupported_type` | `decode_failed` (api.md §3.1)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/metadata:
    post:
      tags: [launch]
      operationId: createMetadata
      summary: Canonicalize + hash + publish metadata JSON (spec §8.3, §12.19)
      description: |
        Server builds the fixed field set + version tag, canonicalizes with the shared
        `canonicalizeMetadata` (packages/shared — the single implementation), keccak256-hashes,
        and PUTs to R2 at `metadata/{hash}.json` (content-addressed). Text moderation +
        impersonation checks run but NEVER block the response (moderation gates listing,
        not creation — spec §8.4). The client MUST re-verify `metadataHash` with the shared
        canonicalizer before signing the tx (normative for M3 — spec §12.19).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MetadataRequest" }
      responses:
        "200":
          description: Canonical metadata published
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data: { $ref: "#/components/schemas/MetadataResponse" }
                  error: { type: "null" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/search:
    get:
      tags: [search]
      operationId: search
      summary: Search over name, ticker, contract address, creator address (spec §5.1)
      description: |
        Single endpoint, pg_trgm (api.md §3.3). `^0x[0-9a-fA-F]{6,40}$` queries switch to
        address mode (prefix/exact on token + creator address, exact pins first); otherwise
        trigram similarity over name/ticker with ticker boost ×1.2, volume tiebreak,
        similarity floor 0.25 (ratified defaults, spec §12.22). Hidden listings excluded.
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string, minLength: 1, maxLength: 80 }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        "200":
          description: Matching tokens (same card projection as /v1/tokens)
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    type: object
                    required: [results]
                    properties:
                      results:
                        type: array
                        items: { $ref: "#/components/schemas/TokenCard" }
                  error: { type: "null" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/tokens:
    get:
      tags: [tokens]
      operationId: listTokens
      summary: Token grid — sorts + filters (spec §5.1)
      description: |
        `trending = vol24h × e^(−age/24h)` (ratified default, spec §12.22, tunable config);
        `progress = real_eth_reserves / graduation_eth` (pre-grad only). Hidden listings excluded;
        `pending_review` remains listed (spec §12.21).
      parameters:
        - name: sort
          in: query
          schema:
            type: string
            enum: [trending, newest, mcap, volume24h, progress]
            default: trending
        - name: filter
          in: query
          schema:
            type: string
            enum: [pregrad, graduated, all]
            default: all
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Token cards
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    type: object
                    required: [tokens, nextCursor]
                    properties:
                      tokens:
                        type: array
                        items: { $ref: "#/components/schemas/TokenCard" }
                      nextCursor: { $ref: "#/components/schemas/NextCursor" }
                  error: { type: "null" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/tokens/king-of-the-hill:
    get:
      tags: [tokens]
      operationId: kingOfTheHill
      summary: Discover hero — closest to graduation, volume-weighted (spec §5.1)
      description: |
        `ORDER BY (real_eth_reserves/graduation_eth) × ln(1+volume_eth_24h) DESC` among
        pre-grad tokens (ratified default, spec §12.22; tunable config).
      responses:
        "200":
          description: The current King of the Hill (`token` null when no pre-grad tokens exist)
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    type: object
                    required: [token]
                    properties:
                      token:
                        oneOf:
                          - $ref: "#/components/schemas/TokenCard"
                          - type: "null"
                  error: { type: "null" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/tokens/{address}:
    get:
      tags: [tokens]
      operationId: getToken
      summary: Token detail + Trust panel payload (spec §5.2)
      description: |
        Hidden tokens are returned WITH `moderation.visibility = 'hidden'`, never 404 —
        hiding is a listing concern only (ratified, spec §12.21).
      parameters:
        - $ref: "#/components/parameters/TokenAddress"
      responses:
        "200":
          description: Full detail incl. reserves, graduation progress, Trust panel
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data: { $ref: "#/components/schemas/TokenDetail" }
                  error: { type: "null" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/tokens/{address}/trades:
    get:
      tags: [tokens]
      operationId: listTokenTrades
      summary: Trade feed — server-sorted + keyset-paginated (spec §5.2/§12.59; indexer.md §8.4)
      description: |
        Server-authoritative sort + keyset pagination (§12.59) — never client sort. `sort` is a CLOSED
        allowlist mapped API-side to a fixed column (age→block_timestamp, side→is_buy, trader→trader,
        amount→eth_amount, price→price_eth; tiebreak id=`{txHash}-{logIndex}`); anything outside it (or
        a `dir` ≠ asc|desc) is 400 — no caller string reaches ORDER BY. Uniform `{ items, nextCursor }`
        envelope (paginatedTradesResponseSchema).
      parameters:
        - $ref: "#/components/parameters/TokenAddress"
        - name: since
          in: query
          description: Unix timestamp or block number floor for backfill-heal
          schema: { type: integer, minimum: 0 }
        - name: sort
          in: query
          description: Sort field (closed allowlist §12.59; default age). Out-of-allowlist ⇒ 400.
          schema: { $ref: "#/components/schemas/TradeSortField" }
        - name: dir
          in: query
          description: Sort direction (default desc — newest-first)
          schema: { $ref: "#/components/schemas/SortDir" }
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Trades (curve + v3 unified; each row carries venue + confirmationState)
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    type: object
                    required: [items, nextCursor]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/TradeRow" }
                      nextCursor: { $ref: "#/components/schemas/NextCursor" }
                  error: { type: "null" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/tokens/{address}/comments:
    get:
      tags: [tokens]
      operationId: listTokenComments
      summary: Per-token comments — public, keyset-paginated newest-first (spec §12.63b)
      description: |
        Off-chain, SIWE-authored, §8.4-moderation-gated, flat comments for one token.
        Newest-first (created_at DESC, id tiebreak) keyset page via the shared
        `{ items, nextCursor }` envelope. HIDDEN comments are excluded (visible +
        pending_review only — pending_review remains listed, §12.21).
      parameters:
        - $ref: "#/components/parameters/TokenAddress"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Comments (newest-first; hidden excluded)
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    type: object
                    required: [items, nextCursor]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Comment" }
                      nextCursor: { $ref: "#/components/schemas/NextCursor" }
                  error: { type: "null" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }
    post:
      tags: [tokens]
      operationId: postTokenComment
      summary: Post a comment — SIWE-authenticated (spec §12.63b)
      description: |
        Requires a `userSession` cookie (POST /v1/auth/login). `author` is taken
        from the session and `tokenAddress` from the path — NEVER the request body,
        which carries ONLY `body` (bounded by COMMENT_BODY_MAX). The comment runs
        through the §8.4 moderation hook; a `visible` result is fanned out on
        `token:{address}:events`. Per-author rate limit (anti-spam). Moderation
        gates listing/broadcast only — never chain state (§8.4).
      security:
        - userSession: []
      parameters:
        - $ref: "#/components/parameters/TokenAddress"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostCommentRequest" }
      responses:
        "201":
          description: Comment created (returned with its moderation status)
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    type: object
                    required: [comment]
                    properties:
                      comment: { $ref: "#/components/schemas/Comment" }
                  error: { type: "null" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/trades/{txHash}:
    get:
      tags: [tokens]
      operationId: getTradesByTx
      summary: Optimistic-UI reconciliation lookup (api.md §3.4; web.md §4.1)
      parameters:
        - name: txHash
          in: path
          required: true
          schema: { $ref: "#/components/schemas/Hex32" }
      responses:
        "200":
          description: All Trade rows in that tx (create-with-initial-buy has one)
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    type: object
                    required: [trades]
                    properties:
                      trades:
                        type: array
                        items: { $ref: "#/components/schemas/TradeRow" }
                  error: { type: "null" }
        "404":
          description: Not indexed yet — client keeps "awaiting index" state and re-polls
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/tokens/{address}/candles:
    get:
      tags: [tokens]
      operationId: listTokenCandles
      summary: Venue-continuous candles for lightweight-charts (spec §5.2; §12.17 intervals)
      description: |
        Bucket-aligned range, max 5000 buckets per request. One unbroken series across
        graduation (curve trades + V3 swaps — indexer.md §4.3). Empty buckets are absent;
        the chart forward-fills (frontend concern).
      parameters:
        - $ref: "#/components/parameters/TokenAddress"
        - name: interval
          in: query
          required: true
          schema: { $ref: "#/components/schemas/CandleInterval" }
        - name: from
          in: query
          required: true
          schema: { type: integer, minimum: 0, description: unix seconds }
        - name: to
          in: query
          required: true
          schema: { type: integer, minimum: 0, description: unix seconds }
      responses:
        "200":
          description: Candles
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    type: object
                    required: [candles]
                    properties:
                      candles:
                        type: array
                        items: { $ref: "#/components/schemas/Candle" }
                  error: { type: "null" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/tokens/{address}/holders:
    get:
      tags: [tokens]
      operationId: listTokenHolders
      summary: Top-holders table — server-sorted + keyset-paginated (spec §5.2/§12.58/§12.59)
      description: |
        Server-authoritative sort + keyset pagination (§12.59) — never client sort. First page (default
        limit) is the top-N holders view. `sort` is a CLOSED allowlist mapped API-side to a fixed column
        (rank/amount/percent→balance — per-token supply is fixed so all three are one physical key;
        address→holder; label→a deterministic CASE over creator/curve/lp_pool/vault + §8.5 flags; tiebreak
        holder); out-of-allowlist (or `dir` ≠ asc|desc) ⇒ 400 — no caller string reaches ORDER BY. Each row
        carries `rank` = true balance-desc rank (ROW_NUMBER over the whole token), stable under any sort.
        BREAKING (§12.59): replaces the pre-redesign `{ holders, holderCount }` with the uniform
        `{ items, nextCursor }` (paginatedHoldersResponseSchema); `holderCount` is no longer returned here.
      parameters:
        - $ref: "#/components/parameters/TokenAddress"
        - name: sort
          in: query
          description: Sort field (closed allowlist §12.59; default rank ≡ balance). Out-of-allowlist ⇒ 400.
          schema: { $ref: "#/components/schemas/HolderSortField" }
        - name: dir
          in: query
          description: Sort direction (default desc — biggest balance first)
          schema: { $ref: "#/components/schemas/SortDir" }
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Holders page (flags + true balance rank computed at query time, not stored)
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    type: object
                    required: [items, nextCursor]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/HolderRow" }
                      nextCursor: { $ref: "#/components/schemas/NextCursor" }
                  error: { type: "null" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/tokens/{address}/fees:
    get:
      tags: [tokens]
      operationId: getTokenFees
      summary: Treasury fee dashboard (spec §6.4 post-graduation revenue; indexer.md §3.5)
      description: |
        `collected` from indexed `Collect` events; `uncollected` is a live NPM `tokensOwed`
        RPC read, cached 60s (point-in-time, not indexed state).
      parameters:
        - $ref: "#/components/parameters/TokenAddress"
      responses:
        "200":
          description: Collected + accrued-uncollected fees
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data: { $ref: "#/components/schemas/FeesResponse" }
                  error: { type: "null" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/stats:
    get:
      tags: [tokens]
      operationId: getStats
      summary: Global stats (api.md §3.4)
      responses:
        "200":
          description: Tokens launched, graduations, 24h volume, treasury fees — all computed, USD per §2
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data: { $ref: "#/components/schemas/StatsResponse" }
                  error: { type: "null" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/creators/{address}/claimable:
    get:
      tags: [tokens]
      operationId: getCreatorClaimable
      summary: Creator-fee claimable balance (spec §7 / §12.63)
      description: |
        Per-creator pull-payment claim surface. `claimableEth` is the AUTHORITATIVE
        live `CreatorVault.balanceOf(creator)` (falling back to the event-derived
        accrued − claimed mirror when no RPC is configured); `totalAccruedEth` /
        `totalClaimedEth` come from the indexed `creator_claimable` roll-up. USD is
        computed at request time (§2). Read-only — never touches chain state (§8.4).
        Vault resolves from the creator's roll-up row, else the configured vault; a
        deployment with NO vault (v1/treasury-only) and no accrual is 404.
        NOTE: endpoint shape is a sensible default pending architect ratification
        (§12.63 doc-lockstep).
      parameters:
        - $ref: "#/components/parameters/TokenAddress"
      responses:
        "200":
          description: Creator claimable balance (live), lifetime accrued/claimed, vault
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data: { $ref: "#/components/schemas/CreatorClaimable" }
                  error: { type: "null" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }

  # ── Portfolio (spec §5.4 — was Phase-2; surfaced day 1 by the ROBBED_ redesign
  #    page 4. Advisory / read-only: no path mutates or depends on mutating chain
  #    state, §8.4. An unknown address is an EMPTY portfolio, never a 404 — the
  #    wallet ETH balance is a live chain read independent of the indexer.) ──────
  /v1/portfolio/{address}:
    get:
      tags: [portfolio]
      operationId: getPortfolioSummary
      summary: Per-address portfolio summary (spec §5.4 stat cells)
      description: |
        Aggregate roll-up: TOTAL VALUE / LOOT ALL-TIME / WALLET ETH + first-seen · trades.
        `walletEthBalance` is a live RPC `eth_getBalance` read (chain truth, exact); the
        roll-up (first-seen, trade/created counts, realized PnL) comes from the indexer's
        materialized `address_pnl`; `totalValueEth` + unrealized PnL are computed at request
        time from live curve-quote prices. PnL is a nullable RANGE (no false precision, §5.2).
        Like other aggregate roll-ups it carries NO `confirmationState`.
      parameters:
        - $ref: "#/components/parameters/TokenAddress"
      responses:
        "200":
          description: Portfolio summary (any address resolves; unknown → empty portfolio)
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data: { $ref: "#/components/schemas/PortfolioSummary" }
                  error: { type: "null" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/portfolio/{address}/holdings:
    get:
      tags: [portfolio]
      operationId: getPortfolioHoldings
      summary: HOLDINGS tab — token · balance · price · value · PNL (spec §5.4)
      description: |
        Projects `balances ⋈ tokens` (BalanceRow IS the holding — anti-drift, db-rows.ts).
        `balance` is Transfer-truth; `priceEth`/`valueEth`/`value` are computed at read-time
        via `@robbed/shared` curve-quote (liquidation value from live reserves) and are `null`
        when the token has never traded (unpriceable — no false price). `unrealizedPnl` is a
        nullable range (null when the holding has no cost basis, §5.2). Cursor-paginated
        (balance DESC).
      parameters:
        - $ref: "#/components/parameters/TokenAddress"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Holdings page
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    type: object
                    required: [holdings, nextCursor]
                    properties:
                      holdings:
                        type: array
                        items: { $ref: "#/components/schemas/PortfolioHolding" }
                      nextCursor: { $ref: "#/components/schemas/NextCursor" }
                  error: { type: "null" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/portfolio/{address}/activity:
    get:
      tags: [portfolio]
      operationId: getPortfolioActivity
      summary: ACTIVITY tab — per-address slice of the trade feed (spec §5.4)
      description: |
        REUSES the shared `TradeRow` (curve + v3 unified; each row carries venue +
        `confirmationState`) — the per-address slice of the same feed as
        `/v1/tokens/{address}/trades`, no parallel shape. Cursor-paginated (newest first).
      parameters:
        - $ref: "#/components/parameters/TokenAddress"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Activity page
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    type: object
                    required: [activity, nextCursor]
                    properties:
                      activity:
                        type: array
                        items: { $ref: "#/components/schemas/TradeRow" }
                      nextCursor: { $ref: "#/components/schemas/NextCursor" }
                  error: { type: "null" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/portfolio/{address}/created:
    get:
      tags: [portfolio]
      operationId: getPortfolioCreated
      summary: CREATED tab — tokens whose creator == address (spec §5.4, §7)
      description: |
        REUSES the `TokenCard` projection (same card as `/v1/tokens`), filtered to tokens
        whose on-chain `creator` == the address (§7 — creator tracked from day 1). Listing-
        gated like `/tokens` (hidden creations excluded, §8.4). Cursor-paginated (newest first).
      parameters:
        - $ref: "#/components/parameters/TokenAddress"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Created-tokens page
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    type: object
                    required: [tokens, nextCursor]
                    properties:
                      tokens:
                        type: array
                        items: { $ref: "#/components/schemas/TokenCard" }
                      nextCursor: { $ref: "#/components/schemas/NextCursor" }
                  error: { type: "null" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/confirmations:
    get:
      tags: [meta]
      operationId: getConfirmations
      summary: Confirmation watermarks (spec §2.1; SSR initial state)
      responses:
        "200":
          description: Current safe/finalized/latest L2 blocks
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data: { $ref: "#/components/schemas/ConfirmationsResponse" }
                  error: { type: "null" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/eth-usd:
    get:
      tags: [meta]
      operationId: getEthUsd
      summary: ETH/USD snapshot with source + asOf (spec §2 — never a constant)
      responses:
        "200":
          description: Latest snapshot from eth_usd_snapshots (indexer poller writes, API reads)
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data: { $ref: "#/components/schemas/EthUsdResponse" }
                  error: { type: "null" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/og/{address}.png:
    get:
      tags: [meta]
      operationId: getTokenOgImage
      summary: Rendered OG share card (image/png 1200×630) for a token
      description: >-
        The token's ROBBED_ terminal share card, rendered server-side with native
        `satori` + `@resvg/resvg-js` and cached in R2 (`og/{address}/{version}.png`,
        where `version` hashes the display fields so a stats change regenerates).
        This is the SINGLE OG renderer — the web sets `<meta og:image>` to this URL
        (OG generation was moved off the Cloudflare Worker to drop the `@vercel/og`
        WASM bundle). All metrics are live indexer values (spec §2); USD carries its
        `asOf`. The extensionless form `/v1/og/{address}` is also accepted. Cache
        hits serve stored bytes; the content `version` is returned as the `ETag`, so
        a matching `If-None-Match` short-circuits to 304. Not chain-mutating (§8.4).
      parameters:
        - name: address
          in: path
          required: true
          schema: { $ref: "#/components/schemas/Address" }
          description: Token contract address (a trailing `.png` is stripped).
      responses:
        "200":
          description: The rendered card. `X-Robbed-Og-Cache` is `hit` (from R2) or `miss` (freshly rendered + stored).
          headers:
            Cache-Control:
              schema: { type: string }
              description: "public, max-age=300, s-maxage=300, stale-while-revalidate=86400"
            ETag:
              schema: { type: string }
              description: Content-version hash of the display data (quoted).
            X-Robbed-Og-Cache:
              schema: { type: string, enum: [hit, miss] }
          content:
            image/png:
              schema: { type: string, format: binary }
        "304":
          description: Not modified — `If-None-Match` matched the current content version. Empty body.
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/healthz:
    get:
      tags: [meta]
      operationId: healthz
      summary: Liveness probe (gate-7)
      responses:
        "200":
          description: Alive
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    type: object
                    required: [ok]
                    properties:
                      ok: { type: boolean, const: true }
                  error: { type: "null" }

  /v1/readyz:
    get:
      tags: [meta]
      operationId: readyz
      summary: Readiness probe — DB + Redis + R2 checks (gate-7)
      description: >-
        200 carries the structured per-dependency `checks` breakdown; the 503 is
        the STANDARD ErrorEnvelope with the closed-enum code `upstream_unavailable`
        and the failing dependency names in `message` (NORMATIVE — api.md §3.5,
        2026-07-12 W3/M2-2 reconcile; supersedes the 2026-07-10 data-carrying-503
        annotation, which contradicted the shared enum's own `upstream_unavailable
        = readyz-503` disposition). Orchestration gates on the HTTP status alone.
      responses:
        "200":
          description: "All dependencies reachable (`ok: true`, full `checks` object)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReadyzResponse" }
        "503":
          description: >-
            One or more dependencies unreachable — `error.code =
            upstream_unavailable`, failing dependency names in `error.message`
            (e.g. "not ready: db, r2")
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /v1/auth/nonce:
    get:
      tags: [auth]
      operationId: userNonce
      summary: Issue a single-use SIWE nonce for user sign-in (spec §12.63b)
      description: >-
        Mints the single-use nonce (Redis, 10-min TTL) a user embeds in the
        EIP-4361 message they sign for POST /v1/auth/login. Reuses the admin SIWE
        nonce machinery; public (no session yet).
      security: []
      responses:
        "200":
          description: A fresh single-use nonce
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data: { $ref: "#/components/schemas/AdminNonceResponse" }
                  error: { type: "null" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/auth/login:
    post:
      tags: [auth]
      operationId: userLogin
      summary: User SIWE (EIP-4361) login → session cookie (spec §12.63b)
      description: >-
        Verifies the signed SIWE message and burns the single-use nonce
        (replay-proof). UNLIKE admin login there is NO address allowlist — any
        valid signer may sign in to post comments. On success sets the HttpOnly,
        SameSite=Lax `userSession` cookie. EOA (ECDSA) signatures only in v1.
        Public (mints the session).
        NOTE (flagged to architect): when the web app and API are on different
        ORIGINS this cookie surface needs `Access-Control-Allow-Credentials: true`
        — the public /v1 CORS is currently cookie-less (api.md §6.1), a system
        guarantee to be re-ratified for the user-session surface.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminLoginRequest" }
      responses:
        "200":
          description: Authenticated; user session cookie set
          headers:
            Set-Cookie:
              description: HttpOnly, SameSite=Lax user session cookie
              schema: { type: string }
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data: { $ref: "#/components/schemas/UserLoginResponse" }
                  error: { type: "null" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/auth/logout:
    post:
      tags: [auth]
      operationId: userLogout
      summary: Clear the user session cookie (spec §12.63b)
      description: Clears the `userSession` cookie via Set-Cookie. Idempotent; no session required.
      security: []
      responses:
        "200":
          description: Session cookie cleared
          headers:
            Set-Cookie:
              description: Expired/empty user session cookie
              schema: { type: string }
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    type: object
                    required: [ok]
                    properties:
                      ok: { type: boolean, const: true }
                  error: { type: "null" }

  /v1/admin/nonce:
    get:
      tags: [admin]
      operationId: adminNonce
      summary: Issue a single-use SIWE nonce (spec §8.4; api.md §6.2)
      description: >-
        Mints the session that the `adminSession` scheme references. Public (no
        session exists yet). Returns a single-use nonce stored in Redis (10-min
        TTL); the client embeds it in the EIP-4361 message it signs for
        POST /v1/admin/login. RATIFIED 2026-07-10 (was implemented but absent
        from the frozen contract; transcribed from apps/api/src/admin/routes.ts).
      security: []
      responses:
        "200":
          description: A fresh single-use nonce
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data: { $ref: "#/components/schemas/AdminNonceResponse" }
                  error: { type: "null" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/admin/login:
    post:
      tags: [admin]
      operationId: adminLogin
      summary: SIWE (EIP-4361) login → session cookie (spec §8.4; api.md §6.2)
      description: >-
        Verifies the signed SIWE message against the config admin allowlist and
        burns the single-use nonce (replay-proof). On success sets the HttpOnly,
        SameSite=strict `adminSession` cookie (12h) via Set-Cookie and returns the
        `csrfToken` the client must send as `X-CSRF-Token` on every admin
        mutation. EOA (ECDSA) signatures only in v1 — EIP-1271 smart-account login
        is flagged to hoodpad-architect. Public (mints the session).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminLoginRequest" }
      responses:
        "200":
          description: Authenticated; session cookie set, CSRF token returned
          headers:
            Set-Cookie:
              description: HttpOnly, SameSite=strict admin session cookie (12h)
              schema: { type: string }
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data: { $ref: "#/components/schemas/AdminLoginResponse" }
                  error: { type: "null" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/admin/logout:
    post:
      tags: [admin]
      operationId: adminLogout
      summary: Clear the admin session cookie (api.md §6.2)
      description: Clears the `adminSession` cookie via Set-Cookie. Idempotent; no session required.
      security: []
      responses:
        "200":
          description: Session cookie cleared
          headers:
            Set-Cookie:
              description: Expired/empty admin session cookie
              schema: { type: string }
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    type: object
                    required: [ok]
                    properties:
                      ok: { type: boolean, const: true }
                  error: { type: "null" }

  /v1/admin/moderation/queue:
