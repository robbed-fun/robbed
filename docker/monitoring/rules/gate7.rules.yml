# ROBBED_ gate-7 alert rules (gate 7; indexer.md; P-3).
#
# Series names match apps/indexer/src/metrics.ts (M2-12) exactly. Threshold
# provenance, per rule:
# - SPEC'D — numeric threshold written in indexer.md (authoritative).
#   - M0      — governance constant from tools/m0/out/constants.json.governance
#               (clusterAlertThresholds: perTokenPct=25, platformPct=10,
#               windowHours=24) — already baked into the indexer's
#               funding_cluster_vol_share_breach gauge; rules key off the
#               breach gauge so retuning happens in ONE place (env/constants),
# never in this file (no inlined governance values).
# - PLACEHOLDER — says "alert on stall" (or lists the series with no
#               number); the value here is a documented engineering default,
#               tuned at M4 with robbed-security. Marked `tuning: placeholder`.
#
# Delivery (pager/webhook routing) is deliberately NOT decided here — :
# "delivery mechanism per infra choice at M4". alertmanager.yml routes to a
# no-integration placeholder receiver until then.
#
# severity: page = "pages immediately"; warn = advisory/self-healing.

groups:
  - name: robbed-gate7-liveness
    rules:
      # SPEC'D — indexer_head_lag_seconds alert > 10s.
      - alert: IndexerHeadLagHigh
        expr: indexer_head_lag_seconds > 10
        for: 1m
        labels:
          severity: page
        annotations:
          summary: "Indexer head lag {{ $value }}s (> 10s)"
          description: "Chain head vs last indexed event exceeds 10s — sync stalled or RPC degraded. Runbook: docs/developers/runbooks/prod-images.md."

      # SPEC'D — ws_publish_to_head_ms p95 > 300ms (guards <500ms budget).
      - alert: WsPublishLatencyP95High
        expr: histogram_quantile(0.95, sum by (le) (rate(ws_publish_to_head_ms_bucket[5m]))) > 300
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "Publish→head p95 {{ $value }}ms (> 300ms)"
          description: "The <500ms event-to-browser budget is at risk. Check Redis, indexer host load, Alchemy WS."

      # PLACEHOLDER (tuning: M4) — says "alert on stall" with no number.
      # Stall detector: the lag DERIVATIVE tracks the head-block rate (~10
      # blocks/s at ~100ms blocks) when the safe watermark is frozen (batch
      # poster down ⇒ user-visible badge stall). deriv > 5 blocks/s sustained
      # 10m ≈ watermark not advancing at all for 10 minutes.
      - alert: ConfirmationSafeWatermarkStalled
        expr: deriv(confirmation_safe_lag_blocks[15m]) > 5
        for: 10m
        labels:
          severity: page
          tuning: placeholder
        annotations:
          summary: "posted-to-L1 (safe) watermark stalled (badge stall)"
          description: "confirmation_safe_lag_blocks is growing at head rate — the L1 batch poster looks down. Confirmation badges stop advancing platform-wide."

      # PLACEHOLDER (tuning: M4) — same stall detector for the finalized tag.
      - alert: ConfirmationFinalizedWatermarkStalled
        expr: deriv(confirmation_finalized_lag_blocks[15m]) > 5
        for: 20m
        labels:
          severity: page
          tuning: placeholder
        annotations:
          summary: "finalized watermark stalled "
          description: "confirmation_finalized_lag_blocks growing at head rate for 20m — L1 finality propagation stalled. Bridge/withdrawal + large-value displays depend on this tier."

      # PLACEHOLDER (tuning: M4) — meta: the gate-7 exposition itself is gone.
      - alert: IndexerMetricsScrapeDown
        expr: up{job="robbed-indexer"} == 0
        for: 2m
        labels:
          severity: page
          tuning: placeholder
        annotations:
          summary: "indexer /metrics unreachable"
          description: "No gate-7 visibility — every other rule in this file is blind while this fires."

  - name: robbed-gate7-invariants
    rules:
      # SPEC'D — mismatch > 0 pages review (Trust panel shows it either way).
      - alert: MetadataHashMismatch
        expr: metadata_mismatch_total > 0
        for: 0m
        labels:
          severity: page
        annotations:
          summary: "{{ $value }} token(s) with metadata hash mismatch "
          description: "Canonical R2 JSON no longer keccak-matches the on-chain commitment for at least one token — possible R2 tamper. Review immediately."

      # SPEC'D — fee_collections.recipient != treasury ⇒ page immediately.
      - alert: FeeRecipientMismatch
        expr: increase(fee_recipient_mismatch_total[5m]) > 0
        for: 0m
        labels:
          severity: page
        annotations:
          summary: "V3 Collect paid a non-treasury recipient (invariant)"
          description: "LPFeeVault invariant violated at the indexer's view — investigate the Collect tx immediately."

      # SPEC'D — trade with fee_eth > 2% of leg ⇒ page (fee ceiling).
      - alert: TradeFeeCeilingBreach
        expr: trade_fee_ceiling_breach_total > 0
        for: 0m
        labels:
          severity: page
        annotations:
          summary: "{{ $value }} curve trade(s) with fee > 2% of the ETH leg"
          description: "In-contract fee computation invariant breached as indexed — page contracts + security."

      # SPEC'D — second Graduated for a token ⇒ page immediately (gate 2).
      - alert: GraduationDoubleFire
        expr: increase(graduation_double_fire_total[5m]) > 0
        for: 0m
        labels:
          severity: page
        annotations:
          summary: "Repeat Graduated event for an already-graduated token"
          description: "Graduation single-fire invariant violated — page immediately (gate 2 /)."

  - name: robbed-gate7-data-quality
    rules:
      # SPEC'D — eth_usd_snapshot_age_seconds alert > 5m (USD goes
      # "dated", never stale-silent — no-hardcoded-metrics rule).
      - alert: EthUsdSnapshotStale
        expr: eth_usd_snapshot_age_seconds > 300
        for: 1m
        labels:
          severity: page
        annotations:
          summary: "ETH/USD snapshot {{ $value }}s old (> 5m)"
          description: "Poller down or fail-closed tripped. USD displays go 'dated'; fix the source, never inline a price."

      # M0 — governance.clusterAlertThresholds (perTokenPct=25 / platformPct=10,
      # 24h window). The breach gauge is computed in-process against those
      # constants (env-overridable); this rule only surfaces it, per scope.
      - alert: FundingClusterShareBreach
        expr: funding_cluster_vol_share_breach == 1
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "Funding-cluster volume share breach (scope {{ $labels.scope }})"
          description: "A single funder cluster exceeds its M0 governance share threshold ({{ $labels.scope }}). Advisory alert — never gates chain state. Route to security."

      # PLACEHOLDER (tuning: M4) — publishes are self-healing (clients
      # REST-heal on seq gap, →), so sustained-rate only, warn-level.
      - alert: RedisPublishErrorsSustained
        expr: rate(redis_publish_errors_total[5m]) > 0.1
        for: 10m
        labels:
          severity: warn
          tuning: placeholder
        annotations:
          summary: "Redis publish failures sustained ({{ $value }}/s over 5m)"
          description: "WS updates degraded to REST-heal for 10m+. Check Redis health / indexer→Redis connectivity."

      # PLACEHOLDER (tuning: M4) — lists the series without a threshold;
      # a persistently large unfetched backlog means R2/CDN or verifier trouble.
      - alert: MetadataUnfetchedBacklog
        expr: metadata_unfetched_total > 0
        for: 6h
        labels:
          severity: warn
          tuning: placeholder
        annotations:
          summary: "{{ $value }} token(s) unfetched for 6h+"
          description: "Metadata verifier cannot fetch canonical JSON from R2 for hours — Trust panels stuck on 'unfetched'. Check R2/CDN + verifier logs."
