# ROBBED_ CI — spec §10 gate 1 (static analysis + fmt) and gate 2 entry (tests).
# Jobs are conditional on their service directory existing so CI stays green
# while milestones land incrementally.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      has_contracts: ${{ steps.check.outputs.has_contracts }}
      has_apps: ${{ steps.check.outputs.has_apps }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          echo "has_contracts=$([ -f contracts/foundry.toml ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_apps=$([ -f package.json ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

  contracts:
    needs: changes
    if: needs.changes.outputs.has_contracts == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # §10 gate 1 lint tooling — versions PINNED so findings are reproducible in review.
      - name: install static-analysis tools
        run: npm i -g solhint@6.2.3 @cyfrin/aderyn@0.6.8
      # §10 gate 1: fmt enforced
      - name: forge fmt
        run: forge fmt --check
      # Hard-rule greps (auto-fail) — spec §2/§6.5/§6.7/§4.1. Comments are stripped first so a
      # doc-comment that merely names a banned token cannot false-fail; scans src/ only.
      - name: hard-rule greps
        run: |
          status=0
          viol(){ echo "::error::HARD-RULE VIOLATION: $1"; status=1; }
          scan(){ hits=$(for f in $(find src -name '*.sol'); do sed -E 's://.*$::; s:/\*.*\*/::g' "$f" | grep -nE "$2" | sed "s#^#$f:#"; done); if [ -n "$hits" ]; then echo "$hits"; viol "$1"; fi; }
          scan "block.number banned (spec 2/6.5)" 'block\.number'
          scan "pragma range banned - exact pin only (spec 6.7)" '\^0\.8|>=[[:space:]]*0\.8'
          scan "caller-supplied fee / checkFee banned (spec 4.1)" 'checkFee'
          scan "OZ Pausable/whenNotPaused banned (spec 6.5)" 'Pausable|whenNotPaused'
          scan "sell-pause identifier banned (spec 6.5)" 'pauseSell'
          [ $status -eq 0 ] && echo "greps: clean"
          exit $status
      # §10 gate 1: solhint — .solhint.json errors on the load-bearing rules (compiler pin,
      # no-global-import, gas-custom-errors, func-visibility). Warnings are dispositioned in
      # contracts/slither.triage.json and do not fail the build.
      - name: solhint
        run: solhint 'src/**/*.sol'
      # §10 gate 1: Aderyn (report-only; every finding triaged in slither.triage.json). Non-blocking
      # by design (Slither + greps are the hard gate); the report is uploaded as an artifact.
      - name: aderyn
        run: aderyn -o aderyn.report.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aderyn-report
          path: contracts/aderyn.report.json
      # §6.7: whole workspace on the single pinned solc (foundry.toml).
      # --sizes enforces EIP-3860/170 limits for DEPLOYABLES only: test/script sources are
      # skipped because vm-deployed test harnesses (e.g. the gate-2 PoolGriefHandler, ~58KB
      # initcode) legitimately exceed the limit foundry disables at test runtime. The full
      # tree (tests included) still compiles in the `test` step below.
      - name: build
        run: forge build --sizes --skip 'test/**' --skip 'script/**'
      # §10 gate 2: unit + fuzz + invariants
      - name: test
        run: forge test -vvv
        env:
          FOUNDRY_PROFILE: ci

  slither:
    needs: changes
    if: needs.changes.outputs.has_contracts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      # §10 gate 1: zero unexplained findings. Config = contracts/slither.config.json (path/dep
      # filters + informational-class exclusions with rationale); per-instance dispositions live in
      # contracts/slither.db.json (triage DB, content-hash keyed — detectors stay LIVE so future
      # code re-triggers them). slither-version is PINNED to match the DB's finding IDs: a version
      # bump can shift IDs and forces re-triage. Any undispositioned Low+ finding fails the job.
      # Action pinned ≥v0.4.2: slither-analyzer 0.11.5 requires Python ≥3.10, which v0.4.0's
      # image lacks ("No matching distribution found").
      - uses: crytic/slither-action@v0.4.2
        with:
          target: contracts
          fail-on: low
          slither-version: 0.11.5
          slither-args: --config-file contracts/slither.config.json

  apps:
    needs: changes
    if: needs.changes.outputs.has_apps == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # §12.29: pnpm owns installs (one lockfile: pnpm-lock.yaml); Bun stays the runtime and
      # test runner. pnpm/action-setup reads the pinned version from package.json#packageManager.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: oven-sh/setup-bun@v2
      - run: pnpm install --frozen-lockfile
      # typecheck every package that defines it (mirrors scripts/validate.sh stage 5)
      - run: pnpm -r --if-present run typecheck
      # bun-test packages (shared/api/indexer discover *.test.ts like validate.sh stage 5).
      # find-based: the previous `ls glob1 glob2 glob3` required ALL globs to match and
      # silently skipped every package (review-workflow finding, 2026-07-11).
      - run: |
          set -e
          ran=0
          for pkg in packages/* apps/*; do
            [ -f "$pkg/package.json" ] || continue
            if find "$pkg/src" "$pkg/test" -name '*.test.ts' -type f 2>/dev/null | grep -q .; then
              echo "── bun test: $pkg"
              (cd "$pkg" && bun test)
              ran=$((ran+1))
            fi
          done
          # vacuity guard: this repo always has bun-test packages — zero discoveries = the
          # discovery itself broke again, fail loud instead of passing green.
          [ "$ran" -ge 3 ] || { echo "::error::bun-test discovery found only $ran package(s) — expected >=3"; exit 1; }
      # … plus apps/web's Vitest suite (tests/*.test.tsx — a different runner by design, web.md §8)
      - run: bun run test
        working-directory: apps/web

  e2e:
    # §9 / gate G-6 final leg (plan item I-6): the full user-flow matrix
    # (apps/web/e2e/user-flows.md ↔ apps/web/e2e/flows, plan item I-5) against the REAL local stack —
    # docker compose (I-2: postgres/redis/minio + anvil FORK of Robinhood Chain 4663 +
    # in-container contract deploy + api/ws/indexer/web), brought up readiness-gated via
    # `dev:stack` (I-3/G-1), health-checked via `dev:health`, then Playwright (mirrors
    # scripts/validate.sh stage 6) plus the static flow-coverage gate (G-5b).
    # Compose v2 + buildx are preinstalled on ubuntu-latest (actions/runner-images,
    # verified 2026-07-11).
    #
    # EGRESS / RATE-LIMIT NOTE: the anvil service forks the PUBLIC Robinhood RPC —
    # every CI run hits rpc.mainnet.chain.robinhood.com (rate-limited). If e2e starts
    # flaking on fork RPC errors, set the ROBINHOOD_RPC_URL repo secret (preferred) or
    # repo variable to a private/Alchemy endpoint; it is honored below.
    needs: [changes, apps]           # gate on the cheap unit/typecheck job before ~20 min of compose
    if: needs.changes.outputs.has_apps == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # Fork-RPC override — secret wins over variable; both unset ⇒ empty string ⇒
      # compose's `${ROBINHOOD_RPC_URL:-<public RPC>}` default applies (`:-` covers empty).
      ROBINHOOD_RPC_URL: ${{ secrets.ROBINHOOD_RPC_URL || vars.ROBINHOOD_RPC_URL }}
      # Real-data run: e2e asserts live indexed state, never the mock fixture (compose default true).
      NEXT_PUBLIC_MOCK_DATA: "false"
      # E2E wallet mode (apps/web/e2e/README.md): wagmi mock connector + window.__ROBBED_E2E__
      # bridge; anvil's well-known PUBLIC dev accounts 0..3 in role order
      # (creator, treasury, trader, trader2 — apps/web/e2e/harness/config.ts). Not secrets.
      NEXT_PUBLIC_E2E: "true"
      NEXT_PUBLIC_E2E_ACCOUNTS: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266,0x70997970C51812dc3A010C7d01b50e0d17dc79C8,0x3C44CdDdB6a900fa2b585dd299e03d12FA4293BC,0x90F79bf6EB2c4f870365E785982E1f101E93b906"
      # CI bring-up is always cold (in-container pnpm install into fresh named volumes,
      # NOT cached across runs — accepted cost, several minutes) — generous deadline.
      DEV_STACK_TIMEOUT_SECS: "1500"
    steps:
      # submodules: the deploychain one-shot runs Deploy.s.sol in-container against the
      # bind-mounted repo — contracts/lib (forge deps) must be checked out.
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      # Mirror of the apps job: pnpm owns installs, Bun runs the tooling (§12.29).
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: oven-sh/setup-bun@v2
      - run: pnpm install --frozen-lockfile
      # robbed-dev image: build ONCE via buildx with a GHA layer cache and load it into the
      # daemon. `cache-to type=gha` needs the buildx docker-container driver
      # (docs.docker.com/build/cache/backends/gha), whose layer cache is SEPARATE from the
      # daemon builder compose uses — so dev:stack must then run `up -d` WITHOUT `--build`
      # (DEV_STACK_NO_BUILD=1, tools/localstack/stack.ts): an unconditional `--build` would
      # silently rebuild cache-blind and waste this step.
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/dev.Dockerfile
          tags: robbed-dev
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # Readiness-gated bring-up (I-3/G-1): waits until every long-running service is healthy
      # (indexer = Ponder /ready, i.e. backfill complete) and every one-shot
      # (deps/createbuckets/apimigrations/deploychain) exited 0; fails loud with log tails.
      # Linux-CI bind-mount UID fix: the `deploychain` foundry container runs `forge script`
      # as the image's `foundry` user, but the repo is checked out as the runner user — so the
      # container cannot create/write the bind-mounted forge output dirs (`contracts/out`,
      # `cache`, `broadcast`) or emit `tools/localstack/out/local.env`. macOS Docker Desktop's
      # osxfs/virtiofs masks this locally; on a Linux runner the mismatch is literal. Pre-create
      # + world-write the dirs the deploy writes (CI checkout is throwaway).
      - name: make deploy bind-mount dirs container-writable (CI Linux UID mismatch)
        run: |
          mkdir -p contracts/out contracts/cache contracts/broadcast tools/localstack/out
          chmod -R 777 contracts/out contracts/cache contracts/broadcast tools/localstack/out
      - name: bring up stack (dev:stack)
        run: bun run dev:stack
        env:
          DEV_STACK_NO_BUILD: "1"
      # G-1 checklist: DB, Redis, chain id 4663, indexer head advancing, API healthz/readyz,
      # WS sub/unsub round-trip, web 200.
      - name: health checklist (dev:health)
        run: bun run dev:health
      # Playwright browsers — cached on the exact @playwright/test version; on a cache hit
      # `install --with-deps` skips the download and only apt-installs OS deps.
      - name: resolve playwright version
        id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"
        working-directory: apps/web
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}
      - run: bunx playwright install --with-deps chromium
        working-directory: apps/web
      # The flow matrix itself — same invocation as scripts/validate.sh stage 6; the harness
      # defaults (apps/web/e2e/harness/config.ts) already target the compose 4XXX host ports.
      - name: playwright e2e
        run: bunx playwright test
        working-directory: apps/web
      # G-5b static coverage gate: every catalog ID covered by exactly its declared
      # assertable-layers (no stack needed; runs after so a red matrix still surfaces both).
      - name: flow-coverage gate
        run: bun run e2e:coverage
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report/
            apps/web/test-results/
            apps/web/e2e/.report/
          if-no-files-found: ignore
      - name: stack logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=200
      - name: tear down stack
        if: always()
        run: docker compose down -v

  docs:
    # Mechanical doc lint (scripts/doc-check.ts): relative links + anchors,
    # § references vs docs/spec.md, canonical LP copy, mermaid/code
    # fences, m0 constants markers, openapi.yaml parse. The LLM triage layer
    # is the local /doc-check command; this job only enforces the mechanical
    # findings.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun scripts/doc-check.ts

  spec-check:
    # Headless spec compliance review of the PR diff (project policy — CONTRIBUTING.md).
    # Requires the ANTHROPIC_API_KEY repo secret; skips gracefully when absent
    # (e.g. forks) — the local /spec-check command remains mandatory either way.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check API key
        id: key
        run: echo "present=${{ secrets.ANTHROPIC_API_KEY != '' }}" >> "$GITHUB_OUTPUT"
      - name: Claude spec-check
        if: steps.key.outputs.present == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Run the spec compliance review defined in .claude/commands/spec-check.md
            against the diff of this pull request (diff vs the merge base with main).
            Report findings as a markdown table (rule, file:line, severity, spec section).
            If any Critical or High finding exists, exit with a non-zero status.
          claude_args: "--allowedTools 'Bash(git diff:*),Bash(git log:*),Read,Grep,Glob'"
