packages:
  - "apps/*"
  - "packages/*"

# Single-version policy for shared libraries (CLAUDE.md anti-drift rule).
# Services reference these via `catalog:` so they can never diverge on versions.
# Versions match what packages/shared resolved to under the previous bun.lock.
catalog:
  zod: 4.4.3
  viem: 2.55.0
  # hono is used by ≥2 services (api server + indexer's required Ponder api file) — single version.
  hono: 4.12.28
