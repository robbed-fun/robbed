# ROBBED_ — TESTNET stack (Phase T / T-5 staging shape, delivered ahead of the
# testnet deploy as P-9/M2-0 infrastructure): the same off-chain stack as docker-compose.yml
# (postgres, redis, minio, api, ws, indexer, web) pointed at the REMOTE Robinhood Chain testnet.
#
#   NO anvil, NO deploychain: the chain is remote and contracts are deployed by the Phase-T
#   `forge script` run (T-3), never by compose.
#
# ── HARD RULE: no invented testnet parameters (spec §13, Phase-T rule) ──
# The Robinhood testnet chain ID / RPC / WS / Blockscout URLs are a §13 open item pulled from
# OFFICIAL Robinhood docs at Phase-T start. This file carries NO defaults for them — the
# REQUIRED `${TESTNET_*:?…}` guards below make `docker compose config`/`up` fail loud when
# unset. Export them in your shell or a root `.env`:
#
#   TESTNET_RPC_URL       required — official testnet JSON-RPC (http/https)
#   TESTNET_RPC_WS_URL    OPTIONAL — WS JSON-RPC. Not invention-prevention: the only official WS
#                         JSON-RPC is the key-gated Alchemy endpoint (wss://robinhood-testnet.g.
#                         alchemy.com/v2/{KEY}, NEEDS-USER — may arrive later). Empty/unset ⇒ the
#                         indexer falls back to HTTP polling (apps/indexer/src/config.ts:
#                         INDEXER_RPC_WS is optional, `|| undefined`). NEVER the sequencer feed
#                         wss (feed.testnet…) — that is a block feed, not JSON-RPC.
#   TESTNET_CHAIN_ID      required — official testnet chain id (asserted by `chaincheck` preflight)
#   (TESTNET_BLOCKSCOUT_URL is part of the same §13 set but is consumed by the T-3 forge
#    verification step, not by any service here — see docs/runbooks/docker.md "Testnet stack".)
#
# ── Contract addresses + START_BLOCK: fail-closed on tools/localstack/out/testnet.env ──
# No contracts exist on testnet yet (tools/deployments/testnet.json lands at T-3). This stack
# requires `tools/localstack/out/testnet.env` — same key contract as the local deploychain-emitted
# local.env (CURVE_FACTORY_ADDRESS, ROUTER_ADDRESS, MIGRATOR_ADDRESS, TREASURY_ADDRESS,
# LP_FEE_VAULT_ADDRESS, START_BLOCK) — to be emitted/derived from the T-3 artifact. api + indexer
# refuse to start without it (clear error pointing at Phase T / T-3); there is no best-effort mode
# here because no local deploy one-shot can fill the gap.
#
# ── STATUS (2026-07-12): §12.55 chain-identity gate IMPLEMENTED — the earlier bypass is fixed ──
# The indexer consumes INDEXER_CHAIN_ID (injected below: 46630), which must resolve in the
# shared deployment registry (packages/shared addresses.ts) AND match the live RPC's
# eth_chainId (double fail-closed, apps/indexer/src/config.ts + assertions.ts). Every
# chain-dependent address (WETH, V3 factory/NPM/SwapRouter02, robbed contracts, treasury)
# resolves from that registry entry — the pre-§12.55 mainnet-default fallbacks are gone, so
# testnet graduated-pool Swap/Collect indexing watches the CORRECT testnet V3 deployment.
# `set -e` is restored in the indexer command per §12.55(d): a failed startup assertion kills
# the container instead of being silently swallowed (the pre-ruling defect observed live here).
#
# ── ANTI-DRIFT: this file is a deliberate self-contained MIRROR of docker-compose.yml ──
# Compose override merging cannot delete whole services or depends_on edges from an untouched base
# (docs.docker.com/reference/compose-file/merge — `!reset` is per-attribute only), so dropping
# anvil/deploychain while keeping the local file untouched requires a standalone file. Discipline:
# any change to the shared services (postgres/redis/minio/createbuckets/apimigrations/deps/api/ws/
# indexer/web) MUST be applied to ALL THREE compose files (docker-compose.yml / .testnet.yml /
# .mainnet.yml); review with
#   diff docker-compose.yml docker-compose.testnet.yml
# Sections copied verbatim are marked "MIRROR"; testnet-specific deltas are marked "TESTNET".
#
# Distinct project name => distinct volumes/network (robbed-testnet_*): testnet DB/backfill state
# never mixes with the local fork's. Host ports live on a DISTINCT 41XX block (dev keeps 40XX/44XX)
# so BOTH stacks can run simultaneously with no *_PORT overrides:
#   4100 web   4101 api   4102 ws   4132 postgres   4164 indexer metrics
#   4169 ponder dev UI/GraphQL     4179 redis       4190 minio S3   4191 minio console
# (env-var NAMES stay identical to the dev stack — only the `:-` defaults differ; an exported
#  *_PORT in your shell/.env therefore applies to BOTH stacks and re-collides them.)
name: robbed-testnet

# MIRROR of docker-compose.yml x-dev-base (see anti-drift note above).
x-dev-base: &dev-base
  build:
    context: .
    dockerfile: docker/dev.Dockerfile
  image: robbed-dev
  init: true
  working_dir: /workspace
  environment: &dev-env
    npm_config_store_dir: /pnpm-store
  volumes:
    - .:/workspace
    - robbed_pnpm_store:/pnpm-store
    - robbed_root_nm:/workspace/node_modules
    - robbed_api_nm:/workspace/apps/api/node_modules
    - robbed_indexer_nm:/workspace/apps/indexer/node_modules
    - robbed_web_nm:/workspace/apps/web/node_modules
    - robbed_shared_nm:/workspace/packages/shared/node_modules

services:
  # ── MIRROR: Postgres 17 (+ pg_trgm) — see docker-compose.yml for tag rationale ──
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-robbed}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-robbed_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-robbed}
    ports:
      - "${POSTGRES_PORT:-4132}:5432"
    volumes:
      - robbed_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── MIRROR: Redis 7 — pub/sub fanout + rate-limit windows ──
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-4179}:6379"
    volumes:
      - robbed_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── MIRROR: minio — R2/S3-compatible object store (still local even on testnet: real R2 is
  # the production/staging deploy's concern — T-5 note in docs/runbooks/docker.md) ──
  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-robbed}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-robbed_dev_secret}
    ports:
      - "${MINIO_PORT:-4190}:9000"
      - "${MINIO_CONSOLE_PORT:-4191}:9001"
    volumes:
      - robbed_miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── MIRROR: one-shot bucket bootstrap ──
  createbuckets:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-robbed}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-robbed_dev_secret}
      R2_BUCKET: ${R2_BUCKET:-robbed-assets}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do echo 'waiting for minio'; sleep 1; done;
      mc mb --ignore-existing local/$${R2_BUCKET};
      mc anonymous set download local/$${R2_BUCKET};
      echo 'bucket ready: '$${R2_BUCKET};
      exit 0;
      "
    restart: "no"

  # ── TESTNET: one-shot preflight — assert the remote RPC serves the DECLARED chain id ──
  # Replaces the local anvil healthcheck's `cast chain-id == 4663` role: fail loud on a wrong /
  # mistyped RPC before any app touches it. TESTNET_CHAIN_ID comes from official docs (§13) — this
  # service is its consumer; no default, no invention. api + indexer gate on this via depends_on.
  chaincheck:
    image: ghcr.io/foundry-rs/foundry:v1.7.1
    environment:
      TESTNET_RPC_URL: ${TESTNET_RPC_URL:?TESTNET_RPC_URL is required — official Robinhood testnet RPC (spec §13 / Phase T; never invented). See docs/runbooks/docker.md 'Testnet stack'.}
      TESTNET_CHAIN_ID: ${TESTNET_CHAIN_ID:?TESTNET_CHAIN_ID is required — official Robinhood testnet chain id (spec §13 / Phase T; never invented). See docs/runbooks/docker.md 'Testnet stack'.}
    # foundry image entrypoint is `sh -c` — command is ONE string (same as docker-compose.yml anvil).
    command:
      - |
        set -e
        echo "preflight: asserting RPC serves chain id $$TESTNET_CHAIN_ID"
        GOT=$$(cast chain-id --rpc-url "$$TESTNET_RPC_URL")
        if [ "$$GOT" != "$$TESTNET_CHAIN_ID" ]; then
          echo "FATAL: RPC $$TESTNET_RPC_URL reports chain id $$GOT, expected TESTNET_CHAIN_ID=$$TESTNET_CHAIN_ID" >&2
          exit 1
        fi
        echo "preflight OK: chain id $$GOT"
    restart: "no"

  # ── MIRROR: one-shot API-owned tables ──
  apimigrations:
    image: postgres:17
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-robbed_dev_pw}
    volumes:
      - ./apps/api/migrations:/migrations:ro
    entrypoint: >
      /bin/sh -c "
      for f in /migrations/*.sql; do
        echo \"applying $$f\";
        psql -h postgres -U ${POSTGRES_USER:-robbed} -d ${POSTGRES_DB:-robbed} -v ON_ERROR_STOP=1 -f $$f || exit 1;
      done;
      echo 'api migrations applied';
      "
    restart: "no"

  # ── MIRROR: one-shot pnpm install ──
  deps:
    <<: *dev-base
    command:
      - /bin/sh
      - -c
      - |
        git config --global --add safe.directory /workspace
        exec pnpm install --frozen-lockfile
    restart: "no"

  # ── api — Hono on Bun. TESTNET deltas: testnet.env is REQUIRED (fail-closed — no deploychain
  # one-shot exists to fill the gap, unlike the local best-effort source), RPC → remote testnet. ──
  api:
    <<: *dev-base
    command:
      - /bin/sh
      - -c
      - |
        if [ ! -f tools/localstack/out/testnet.env ]; then
          echo "FATAL: tools/localstack/out/testnet.env not found." >&2
          echo "  Contract addresses + START_BLOCK come from the Phase-T testnet deploy (plan item T-3," >&2
          echo "  which writes tools/deployments/testnet.json); emit/copy them to tools/localstack/out/testnet.env" >&2
          echo "  with the same keys as the local deploychain local.env. No contracts are deployed on testnet yet" >&2
          echo "  until Phase T runs. See docs/runbooks/docker.md 'Testnet stack'." >&2
          exit 1
        fi
        set -a; . ./tools/localstack/out/testnet.env; set +a
        exec pnpm --filter @robbed/api dev
    environment:
      <<: *dev-env
      API_PORT: "3001"
      API_ENV: development
      DATABASE_URL: postgres://${POSTGRES_USER:-robbed}:${POSTGRES_PASSWORD:-robbed_dev_pw}@postgres:5432/${POSTGRES_DB:-robbed}
      REDIS_URL: redis://redis:6379
      R2_ENDPOINT: http://minio:9000
      R2_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-robbed}
      R2_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-robbed_dev_secret}
      R2_BUCKET: ${R2_BUCKET:-robbed-assets}
      R2_PUBLIC_BASE_URL: http://localhost:${MINIO_PORT:-4190}/${R2_BUCKET:-robbed-assets}
      # Moderation vendors are a §13 open item — stubs stay allowed outside production (§4.3).
      MODERATION_ALLOW_STUBS: "true"
      # Public-/v1 CORS (api.md §6.1): the public tunnel web origin + local browsing.
      # Override seam consistent with the TESTNET_PUBLIC_* pattern above.
      CORS_ALLOWED_ORIGINS: ${TESTNET_CORS_ALLOWED_ORIGINS:-https://testnet.robbed.fun,http://localhost:${WEB_PORT:-4100}}
      # TESTNET: cold `tokensOwed` read (api.md §3.4) against the remote testnet RPC. Required, no default (§13).
      ROBINHOOD_RPC_URL: ${TESTNET_RPC_URL:?TESTNET_RPC_URL is required — official Robinhood testnet RPC (spec §13 / Phase T; never invented). See docs/runbooks/docker.md 'Testnet stack'.}
    ports:
      - "${API_PORT:-4101}:3001"
    depends_on:
      deps:
        condition: service_completed_successfully
      chaincheck:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001/v1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── MIRROR: ws — Bun WS fanout (Redis-only, zero DB) ──
  ws:
    <<: *dev-base
    working_dir: /workspace/apps/api
    command: ["bun", "run", "--hot", "src/ws.ts"]
    environment:
      <<: *dev-env
      WS_PORT: "3002"
      REDIS_URL: redis://redis:6379
    ports:
      - "${WS_PORT:-4102}:3002"
    depends_on:
      deps:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null http://localhost:3002"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── indexer — Ponder. TESTNET deltas: remote RPC (http required, ws OPTIONAL — HTTP-polling
  # fallback, §13), addresses + START_BLOCK from the REQUIRED testnet.env (fail-closed with a
  # Phase-T pointer).
  #
  # §12.55 chain-identity gate (see header STATUS): INDEXER_CHAIN_ID=46630 must resolve in the
  # shared deployment registry AND match the live RPC's eth_chainId; all chain-dependent
  # addresses (WETH/V3 set/robbed contracts/treasury) resolve from that registry entry, with the
  # testnet.env deploy artifact taking precedence for the robbed contracts (identical by
  # construction on testnet). set -e in the command makes any assertion failure kill the
  # container — never weaken the assertions to make this stack boot. ──
  indexer:
    <<: *dev-base
    command:
      - /bin/sh
      - -c
      - |
        # set -e per §12.55(d): the migrate step runs the fail-closed startup
        # assertions (registry membership + live eth_chainId == INDEXER_CHAIN_ID) —
        # its failure MUST kill the container, never be swallowed (the pre-§12.55
        # shape without set -e silently bypassed the chain gate; observed live).
        set -e
        if [ ! -f tools/localstack/out/testnet.env ]; then
          echo "FATAL: tools/localstack/out/testnet.env not found." >&2
          echo "  Contract addresses + START_BLOCK come from the Phase-T testnet deploy (plan item T-3," >&2
          echo "  which writes tools/deployments/testnet.json); emit/copy them to tools/localstack/out/testnet.env" >&2
          echo "  with the same keys as the local deploychain local.env. No contracts are deployed on testnet yet" >&2
          echo "  until Phase T runs. See docs/runbooks/docker.md 'Testnet stack'." >&2
          exit 1
        fi
        set -a; . ./tools/localstack/out/testnet.env; set +a
        # Offchain sidecar tables (watermarks, eth_usd, metadata_verifications — indexer.md §3); idempotent.
        # MIRROR of docker-compose.yml (anti-drift): phase 2 (GIN indexes + views over
        # Ponder-managed tables) is applied by the indexer sidecar boot
        # (src/offchainMigrations.ts) — never re-run migrate from compose for it.
        pnpm --filter @robbed/indexer migrate
        exec pnpm --filter @robbed/indexer exec ponder dev --hostname 0.0.0.0
    env_file:
      - path: .env
        required: false
    environment:
      <<: *dev-env
      # §12.55 chain-identity gate: explicit selection — must have a shared-registry
      # entry AND match the live RPC's eth_chainId (double fail-closed, no default).
      INDEXER_CHAIN_ID: "46630"
      INDEXER_RPC_HTTP: ${TESTNET_RPC_URL:?TESTNET_RPC_URL is required — official Robinhood testnet RPC (spec §13 / Phase T; never invented). See docs/runbooks/docker.md 'Testnet stack'.}
      # OPTIONAL (see header): empty ⇒ apps/indexer/src/config.ts maps INDEXER_RPC_WS
      # `|| undefined` ⇒ Ponder falls back to HTTP polling. Alchemy wss when a key exists;
      # never the sequencer feed.
      INDEXER_RPC_WS: ${TESTNET_RPC_WS_URL:-}
      DATABASE_URL: postgres://${POSTGRES_USER:-robbed}:${POSTGRES_PASSWORD:-robbed_dev_pw}@postgres:5432/${POSTGRES_DB:-robbed}
      REDIS_URL: redis://redis:6379
      METRICS_PORT: "9464"
      # MIRROR of docker-compose.yml — split-horizon metadata fetch (§8.3). This
      # staging stack still uses minio, so the stored metadata_uri is the BROWSER
      # base (host-mapped localhost:${MINIO_PORT}), unreachable from inside this
      # container. The verifier fetches content-addressed objects from the
      # internal base instead; the stored/displayed URL stays the public value.
      # R2_METADATA_BASE_URL is the internal fallback when a row carries no uri.
      R2_METADATA_BASE_URL: http://minio:9000/${R2_BUCKET:-robbed-assets}/metadata
      METADATA_FETCH_REWRITE_FROM: http://localhost:${MINIO_PORT:-4190}/${R2_BUCKET:-robbed-assets}
      METADATA_FETCH_REWRITE_TO: http://minio:9000/${R2_BUCKET:-robbed-assets}
    ports:
      - "${PONDER_PORT:-4169}:42069"
      - "${METRICS_HOST_PORT:-4164}:9464"
    depends_on:
      deps:
        condition: service_completed_successfully
      chaincheck:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # MIRROR of docker-compose.yml (anti-drift): Ponder /ready == historical indexing
      # complete. TESTNET note: a long remote backfill can exhaust these retries and show
      # `unhealthy` while Ponder still works through history — that is honest status
      # (nothing kills the container; restart is "no"), not a failure of the stack file.
      test: ["CMD", "curl", "-sf", "http://localhost:42069/ready"]
      interval: 5s
      timeout: 5s
      retries: 36
      start_period: 90s
    restart: "no"

  # ── web — Next.js 16. TESTNET deltas: MOCK_DATA hard "false" (real-data stack), browser RPC →
  # the official testnet endpoints (required, §13), and NEXT_PUBLIC_CHAIN_ID=46630 — the §12.55
  # chain-identity pattern applied to the web (mirror of INDEXER_CHAIN_ID above): the env var
  # SELECTS the target chain, the shared deployment registry DEFINES it (apps/web env.ts throws
  # on a non-registry id). This flips the whole wagmi/viem chain object (id/name/explorer/WETH)
  # and the address module to the official 46630 testnet params — without it the bundle would
  # compile the shared mainnet CHAIN_ID (4663) and advertise the WRONG chain to wallets (the
  # pre-2026-07-12 defect observed live on :4100). ──
  web:
    <<: *dev-base
    command: ["pnpm", "--filter", "@robbed/web", "exec", "next", "dev", "-H", "0.0.0.0"]
    environment:
      <<: *dev-env
      NEXT_PUBLIC_CHAIN_ID: "46630"
      # Public-origin overrides (Cloudflare Tunnel: testnet.robbed.fun → :4100,
      # api.testnet.robbed.fun → :4101 with /ws → :4102): browser-visible URLs must be
      # reachable from EXTERNAL browsers, so the TESTNET_PUBLIC_* env (root .env) overrides
      # the host-mapped localhost defaults. The public URLs also work for local browsing;
      # unset ⇒ localhost defaults, and port re-bases still flow via the nested ${*_PORT}.
      # R2 stays on the localhost default until minio gets a tunnel hostname or real R2
      # (known limitation — external visitors see broken images; docker.md 'Testnet stack').
      NEXT_PUBLIC_API_BASE_URL: ${TESTNET_PUBLIC_API_BASE_URL:-http://localhost:${API_PORT:-4101}}
      # MIRROR of docker-compose.yml split-horizon API base: SSR (in-container) uses the
      # service-DNS api:3001; the browser keeps the host-mapped NEXT_PUBLIC_API_BASE_URL.
      API_BASE_URL_INTERNAL: http://api:3001
      NEXT_PUBLIC_WS_URL: ${TESTNET_PUBLIC_WS_URL:-ws://localhost:${WS_PORT:-4102}}
      NEXT_PUBLIC_R2_PUBLIC_BASE_URL: ${TESTNET_PUBLIC_R2_BASE_URL:-http://localhost:${MINIO_PORT:-4190}/${R2_BUCKET:-robbed-assets}}
      NEXT_PUBLIC_RPC_HTTP: ${TESTNET_RPC_URL:?TESTNET_RPC_URL is required — official Robinhood testnet RPC (spec §13 / Phase T; never invented). See docs/runbooks/docker.md 'Testnet stack'.}
      # OPTIONAL (see header): empty tolerated by the web env layer (apps/web/src/shared/lib/
      # env.ts `rpcWs: … ?? ""`, verified 2026-07-12) — set the Alchemy wss when a key exists.
      NEXT_PUBLIC_RPC_WS: ${TESTNET_RPC_WS_URL:-}
      NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID:-}
      NEXT_PUBLIC_LARGE_VALUE_ETH_THRESHOLD: ${NEXT_PUBLIC_LARGE_VALUE_ETH_THRESHOLD:-}
      # TESTNET: never the mock fixture — this stack exists to exercise real testnet data.
      NEXT_PUBLIC_MOCK_DATA: "false"
    volumes:
      - .:/workspace
      - robbed_pnpm_store:/pnpm-store
      - robbed_root_nm:/workspace/node_modules
      - robbed_api_nm:/workspace/apps/api/node_modules
      - robbed_indexer_nm:/workspace/apps/indexer/node_modules
      - robbed_web_nm:/workspace/apps/web/node_modules
      - robbed_shared_nm:/workspace/packages/shared/node_modules
      - robbed_web_next:/workspace/apps/web/.next
    ports:
      - "${WEB_PORT:-4100}:3000"
    depends_on:
      deps:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── TESTNET: cloudflared — Cloudflare Tunnel connector AS A COMPOSE SERVICE ──
  # Publishes testnet.robbed.fun / api.testnet.robbed.fun (+/ws) from INSIDE the stack
  # network, so it starts/stops with the stack (supersedes the host systemd user unit
  # cloudflared-robbed-testnet.service). Ingress lives in-repo (NO secrets — the tunnel
  # UUID is routing metadata): tools/localstack/cloudflared/testnet.yml, targeting
  # compose-internal service DNS (web:3000 / api:3001 / ws:3002 — never localhost, which
  # inside this container is the connector itself). Run CREDENTIALS stay on the host and
  # are bind-mounted read-only — never committed (docs/runbooks/docker.md "Public exposure").
  # Multiple connectors per tunnel are supported, so overlap with the (now decommissioned)
  # host unit during migration is safe.
  cloudflared:
    # Pinned current stable (Docker Hub, published 2026-07-09; verified 2026-07-12).
    image: cloudflare/cloudflared:2026.7.1
    # Image ENTRYPOINT is ["cloudflared","--no-autoupdate"]; compose shell-lexes this
    # string into exec args (distroless image — there is no shell to invoke).
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    # The image's default user is distroless nonroot (65532), which cannot read the
    # 0600/0400 host credentials owned by the login user — run as that user instead.
    user: "${CLOUDFLARED_UID:-1000}:${CLOUDFLARED_GID:-1000}"
    volumes:
      - ./tools/localstack/cloudflared/testnet.yml:/etc/cloudflared/config.yml:ro
      - ${CLOUDFLARED_DIR:-~/.cloudflared}/15ec4e57-6998-4da2-8a5b-ca45c10eecba.json:/etc/cloudflared/creds.json:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
      ws:
        condition: service_healthy
    restart: unless-stopped

# Same volume KEYS as docker-compose.yml, but the `name: robbed-testnet` project prefix makes them
# physically distinct (robbed-testnet_robbed_pgdata vs robbed_robbed_pgdata) — testnet backfill
# state never mixes with the local fork's.
