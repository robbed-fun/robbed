# hoodpad contracts — spec §6.7: ONE exact compiler pin, no ranges, anywhere.
# Pin 0.8.35 CONFIRMED against robinhoodchain.blockscout.com verifier config
# (v0.8.35+commit.47b9dedd present in /api/v2/smart-contracts/verification/config,
# checked 2026-07-09).

[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"

solc = "0.8.35"          # exact pin — never a range (spec §6.7)
optimizer = true
optimizer_runs = 200
# evm_version: left at forge default; revisit only if Blockscout verification dictates otherwise.

remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
]

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
quote_style = "double"
number_underscore = "thousands"

[rpc_endpoints]
# Robinhood Chain (chain ID 4663) — used by fork tests (spec §10 gate 3).
robinhood = "${ROBINHOOD_RPC_URL}"
