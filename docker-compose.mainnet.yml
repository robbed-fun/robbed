# ROBBED_ — MAINNET stack (Phase B staging shape): the same off-chain stack as
# docker-compose.testnet.yml (postgres, redis, minio, api, ws, indexer, web + one-shots) pointed at
# REAL Robinhood Chain MAINNET (4663). NO anvil, NO deploychain — the chain is remote and contracts
# deploy only through the ratified Phase-B pipeline (Gate G-A governs), never via compose.
#
# ── STATUS (2026-07-12): INTERIM — this stack RUNS, pointed at TESTNET (46630) values ──
# robbed.fun must be alive before a real 4663 deploy exists, so this stack currently boots
# with TESTNET parameters supplied via env ("later we will replace testnet by mainnet"):
#   • root `.env` (gitignored):  MAINNET_RPC_URL=https://rpc.testnet.chain.robinhood.com,
#     MAINNET_CHAIN_ID=46630, MAINNET_INDEXER_CHAIN_ID=46630, plus the public-URL overrides
#     (https://api.robbed.fun / wss://api.robbed.fun/ws) — each marked INTERIM there.
#   • `tools/localstack/out/mainnet.env` — INTERIM copy of the 46630 (testnet) deploy artifact
#     set (same addresses + START_BLOCK as testnet.env); regenerate from the real 4663 deploy
#     at Phase B.
# §12.55 STAYS HONEST — nothing is bypassed: `chaincheck` asserts the live RPC serves the
# DECLARED MAINNET_CHAIN_ID (46630 today), the indexer's chain-identity gate resolves
# INDEXER_CHAIN_ID=46630 against the shared registry's REAL testnet entry, and there is NO
# INDEXER_ALLOW_FORK_4663 here (the compose default INDEXER_CHAIN_ID=4663 below is still
# refused by the registry gate until a real deploy replaces the fork artifact — that refusal
# is exactly why the interim uses 46630, not a weakened gate).
#
# ── PHASE-B SWAP CHECKLIST (replace testnet by mainnet; nothing else changes) ──
#   1. Real 4663 deploy lands `contracts/deployments/4663.json` (replacing the fork artifact;
#      registry re-codegen'd via robbed-shared; Gate G-A governs — spec §14).
#   2. Emit `tools/localstack/out/mainnet.env` from that artifact (CURVE_FACTORY_ADDRESS,
#      ROUTER_ADDRESS, MIGRATOR_ADDRESS, TREASURY_ADDRESS, LP_FEE_VAULT_ADDRESS, START_BLOCK),
#      replacing the INTERIM testnet copy.
#   3. Root `.env`: MAINNET_RPC_URL=https://rpc.mainnet.chain.robinhood.com,
#      MAINNET_CHAIN_ID=4663; DELETE MAINNET_INDEXER_CHAIN_ID (compose default 4663 takes over).
#      Public-URL overrides stay as-is (api.robbed.fun does not change).
#   4. `docker compose -f docker-compose.mainnet.yml down` + wipe volumes (`down -v` — the DB
#      holds 46630 backfill state) + `up -d`; chaincheck/registry gates re-assert 4663 live.
#   5. Tunnel ingress (tools/localstack/cloudflared/mainnet.yml) is chain-agnostic — no change.
# NOTE: this compose file is the local staging/dry-run shape — the REAL production deploy is
# the P-3 images on Komodo (docs/runbooks/prod-images.md), where API_ENV=production forbids
# moderation stubs (§4.3).
#
# ── HARD RULE: no invented parameters (spec §2/§13) ──
# Mainnet chain facts are ratified (CLAUDE.md chain facts; docs/runbooks/environments.md):
# chain id 4663, public RPC https://rpc.mainnet.chain.robinhood.com (rate-limited; Alchemy
# https://robinhood-mainnet.g.alchemy.com/v2/{KEY} recommended for sustained use). Mirroring the
# testnet discipline, this file still carries NO silent defaults — required values arrive via
# env (`:?` aborts loud), so a mistyped/absent value can never fall back unnoticed:
#
#   MAINNET_RPC_URL       required — official mainnet JSON-RPC (value above; INTERIM: the
#                         official testnet RPC — see STATUS)
#   MAINNET_RPC_WS_URL    OPTIONAL — WS JSON-RPC (Alchemy wss, key-gated). Empty/unset ⇒ the
#                         indexer falls back to HTTP polling (INDEXER_RPC_WS optional in
#                         apps/indexer/src/config.ts). NEVER a sequencer feed wss.
#   MAINNET_CHAIN_ID      required — asserted against the live RPC by `chaincheck` AND
#                         advertised to wallets as NEXT_PUBLIC_CHAIN_ID (one source of truth;
#                         4663 at Phase B, INTERIM 46630)
#   MAINNET_INDEXER_CHAIN_ID  OPTIONAL — indexer chain selection seam; default 4663 (Phase-B
#                         value). INTERIM: root .env sets 46630 so the §12.55 registry gate
#                         resolves the REAL testnet entry (see STATUS; no gate is bypassed).
#
# ── Contract addresses + START_BLOCK: fail-closed on tools/localstack/out/mainnet.env ──
# Same key contract as testnet.env / the local deploychain local.env (CURVE_FACTORY_ADDRESS,
# ROUTER_ADDRESS, MIGRATOR_ADDRESS, TREASURY_ADDRESS, LP_FEE_VAULT_ADDRESS, START_BLOCK).
# INTERIM: the file exists as a loudly-marked copy of the 46630 testnet artifact set (see
# STATUS); at Phase B it is regenerated from the real 4663 deploy artifact. api + indexer
# still refuse to start without it; there is no best-effort mode.
#
# ── ANTI-DRIFT: deliberate self-contained MIRROR of docker-compose.testnet.yml ──
# Same rationale as the testnet file (compose merge cannot delete services/edges). Discipline:
# any change to a shared service goes to ALL THREE compose files (docker-compose.yml /
# .testnet.yml / .mainnet.yml); review with `diff docker-compose.testnet.yml
# docker-compose.mainnet.yml`. Sections copied verbatim are marked "MIRROR"; deltas "MAINNET".
#
# Distinct project name => distinct volumes/network (robbed-mainnet_*). Host ports live on a
# DISTINCT 42XX block (dev 40XX/44XX, testnet 41XX), so all three stacks can run simultaneously:
#   4200 web   4201 api   4202 ws   4229 ponder dev UI/GraphQL (4269 is dev-owned — see indexer)
#   4232 postgres   4264 indexer metrics   4279 redis   4290 minio S3   4291 minio console
# (env-var NAMES stay identical across stacks — only the `:-` defaults differ; an exported
#  *_PORT in your shell/.env applies to ALL stacks and re-collides them.)
name: robbed-mainnet

# MIRROR of docker-compose.testnet.yml x-dev-base (see anti-drift note above).
x-dev-base: &dev-base
  build:
    context: .
    dockerfile: docker/dev.Dockerfile
  image: robbed-dev
  init: true
  working_dir: /workspace
  environment: &dev-env
    npm_config_store_dir: /pnpm-store
  volumes:
    - .:/workspace
    - robbed_pnpm_store:/pnpm-store
    - robbed_root_nm:/workspace/node_modules
    - robbed_api_nm:/workspace/apps/api/node_modules
    - robbed_indexer_nm:/workspace/apps/indexer/node_modules
    - robbed_web_nm:/workspace/apps/web/node_modules
    - robbed_shared_nm:/workspace/packages/shared/node_modules

services:
  # ── MIRROR: Postgres 17 (+ pg_trgm) — see docker-compose.yml for tag rationale ──
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-robbed}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-robbed_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-robbed}
    ports:
      - "${POSTGRES_PORT:-4232}:5432"
    volumes:
      - robbed_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── MIRROR: Redis 7 — pub/sub fanout + rate-limit windows ──
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-4279}:6379"
    volumes:
      - robbed_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── MIRROR: minio — R2/S3-compatible object store (still local here: real R2 is the
  # production deploy's concern — prod-images.md / T-5 note) ──
  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-robbed}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-robbed_dev_secret}
    ports:
      - "${MINIO_PORT:-4290}:9000"
      - "${MINIO_CONSOLE_PORT:-4291}:9001"
    volumes:
      - robbed_miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── MIRROR: one-shot bucket bootstrap ──
  createbuckets:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-robbed}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-robbed_dev_secret}
      R2_BUCKET: ${R2_BUCKET:-robbed-assets}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do echo 'waiting for minio'; sleep 1; done;
      mc mb --ignore-existing local/$${R2_BUCKET};
      mc anonymous set download local/$${R2_BUCKET};
      echo 'bucket ready: '$${R2_BUCKET};
      exit 0;
      "
    restart: "no"

  # ── MAINNET: one-shot preflight — assert the remote RPC serves the DECLARED chain id ──
  # Same pattern as the testnet chaincheck: fail loud on a wrong/mistyped RPC before any app
  # touches it (read-only: one `cast chain-id`). Official value: 4663 (CLAUDE.md chain facts).
  chaincheck:
    image: ghcr.io/foundry-rs/foundry:v1.7.1
    environment:
      MAINNET_RPC_URL: ${MAINNET_RPC_URL:?MAINNET_RPC_URL is required — official Robinhood mainnet RPC (https://rpc.mainnet.chain.robinhood.com; CLAUDE.md chain facts). See docs/runbooks/docker.md 'Mainnet stack'.}
      MAINNET_CHAIN_ID: ${MAINNET_CHAIN_ID:?MAINNET_CHAIN_ID is required — 4663 (CLAUDE.md chain facts; asserted against the live RPC). See docs/runbooks/docker.md 'Mainnet stack'.}
    # foundry image entrypoint is `sh -c` — command is ONE string (same as the other stacks).
    command:
      - |
        set -e
        echo "preflight: asserting RPC serves chain id $$MAINNET_CHAIN_ID"
        GOT=$$(cast chain-id --rpc-url "$$MAINNET_RPC_URL")
        if [ "$$GOT" != "$$MAINNET_CHAIN_ID" ]; then
          echo "FATAL: RPC $$MAINNET_RPC_URL reports chain id $$GOT, expected MAINNET_CHAIN_ID=$$MAINNET_CHAIN_ID" >&2
          exit 1
        fi
        echo "preflight OK: chain id $$GOT"
    restart: "no"

  # ── MIRROR: one-shot API-owned tables ──
  apimigrations:
    image: postgres:17
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-robbed_dev_pw}
    volumes:
      - ./apps/api/migrations:/migrations:ro
    entrypoint: >
      /bin/sh -c "
      for f in /migrations/*.sql; do
        echo \"applying $$f\";
        psql -h postgres -U ${POSTGRES_USER:-robbed} -d ${POSTGRES_DB:-robbed} -v ON_ERROR_STOP=1 -f $$f || exit 1;
      done;
      echo 'api migrations applied';
      "
    restart: "no"

  # ── MIRROR: one-shot pnpm install ──
  deps:
    <<: *dev-base
    command:
      - /bin/sh
      - -c
      - |
        git config --global --add safe.directory /workspace
        exec pnpm install --frozen-lockfile
    restart: "no"

  # ── api — Hono on Bun. MAINNET deltas: mainnet.env is REQUIRED (fail-closed — see header
  # STATUS: it does not exist until a real Phase-B deploy), RPC → real mainnet. ──
  api:
    <<: *dev-base
    command:
      - /bin/sh
      - -c
      - |
        if [ ! -f tools/localstack/out/mainnet.env ]; then
          echo "FATAL: tools/localstack/out/mainnet.env not found." >&2
          echo "  INTERIM state (see file header STATUS): recreate it as a loudly-marked copy of the" >&2
          echo "  46630 testnet artifact set (tools/localstack/out/testnet.env keys). At Phase B it is" >&2
          echo "  emitted from the real 4663 deploy artifact (contracts/deployments/4663.json replacing" >&2
          echo "  the fork artifact; Gate G-A governs, spec §14). Same keys as testnet.env. See" >&2
          echo "  docs/runbooks/docker.md 'Mainnet stack'." >&2
          exit 1
        fi
        set -a; . ./tools/localstack/out/mainnet.env; set +a
        exec pnpm --filter @robbed/api dev
    environment:
      <<: *dev-env
      API_PORT: "3001"
      # Staging shape: this compose file is never the production deploy (see header) —
      # production is the P-3 images on Komodo, where API_ENV=production forbids stubs (§4.3).
      API_ENV: development
      DATABASE_URL: postgres://${POSTGRES_USER:-robbed}:${POSTGRES_PASSWORD:-robbed_dev_pw}@postgres:5432/${POSTGRES_DB:-robbed}
      REDIS_URL: redis://redis:6379
      R2_ENDPOINT: http://minio:9000
      R2_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-robbed}
      R2_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-robbed_dev_secret}
      R2_BUCKET: ${R2_BUCKET:-robbed-assets}
      R2_PUBLIC_BASE_URL: http://localhost:${MINIO_PORT:-4290}/${R2_BUCKET:-robbed-assets}
      MODERATION_ALLOW_STUBS: "true"
      # Public-/v1 CORS (api.md §6.1): the public web origin + local browsing. Stays
      # correct when robbed.fun flips to the CF Worker origin (same hostname).
      # Override seam consistent with the MAINNET_* pattern.
      CORS_ALLOWED_ORIGINS: ${MAINNET_CORS_ALLOWED_ORIGINS:-https://robbed.fun,http://localhost:${WEB_PORT:-4200}}
      # Cold `tokensOwed` read (api.md §3.4) against the real mainnet RPC. Required, no default.
      ROBINHOOD_RPC_URL: ${MAINNET_RPC_URL:?MAINNET_RPC_URL is required — official Robinhood mainnet RPC (https://rpc.mainnet.chain.robinhood.com; CLAUDE.md chain facts). See docs/runbooks/docker.md 'Mainnet stack'.}
    ports:
      - "${API_PORT:-4201}:3001"
    depends_on:
      deps:
        condition: service_completed_successfully
      chaincheck:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001/v1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── MIRROR: ws — Bun WS fanout (Redis-only, zero DB) ──
  ws:
    <<: *dev-base
    working_dir: /workspace/apps/api
    command: ["bun", "run", "--hot", "src/ws.ts"]
    environment:
      <<: *dev-env
      WS_PORT: "3002"
      REDIS_URL: redis://redis:6379
    ports:
      - "${WS_PORT:-4202}:3002"
    depends_on:
      deps:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null http://localhost:3002"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── indexer — Ponder. MAINNET deltas: remote RPC (http required, ws OPTIONAL —
  # HTTP-polling fallback), addresses + START_BLOCK from the REQUIRED mainnet.env
  # (fail-closed — see header STATUS).
  #
  # §12.55 chain-identity gate: INDEXER_CHAIN_ID is a SEAM (${MAINNET_INDEXER_CHAIN_ID:-4663})
  # whose default is the Phase-B value. INTERIM: root .env sets 46630, which the registry gate
  # resolves against the REAL testnet entry and asserts against the live RPC — honest, nothing
  # bypassed. The 4663 default remains DELIBERATELY without INDEXER_ALLOW_FORK_4663: the
  # registry's 4663 entry is still the mainnet-FORK pipeline artifact, so loadConfig REFUSES
  # to boot on 4663 (the ruling forbids 4663 outside a LOCAL fork stack until a real deploy
  # replaces the entry). Never set the fork opt-in here. ──
  indexer:
    <<: *dev-base
    command:
      - /bin/sh
      - -c
      - |
        # set -e per §12.55(d): the migrate step runs the fail-closed startup
        # assertions (registry membership + live eth_chainId == INDEXER_CHAIN_ID) —
        # its failure MUST kill the container, never be swallowed.
        set -e
        if [ ! -f tools/localstack/out/mainnet.env ]; then
          echo "FATAL: tools/localstack/out/mainnet.env not found." >&2
          echo "  INTERIM state (see file header STATUS): recreate it as a loudly-marked copy of the" >&2
          echo "  46630 testnet artifact set (tools/localstack/out/testnet.env keys). At Phase B it is" >&2
          echo "  emitted from the real 4663 deploy artifact (contracts/deployments/4663.json replacing" >&2
          echo "  the fork artifact; Gate G-A governs, spec §14). Same keys as testnet.env. See" >&2
          echo "  docs/runbooks/docker.md 'Mainnet stack'." >&2
          exit 1
        fi
        set -a; . ./tools/localstack/out/mainnet.env; set +a
        # Offchain sidecar tables (watermarks, eth_usd, metadata_verifications — indexer.md §3); idempotent.
        # MIRROR (anti-drift): phase 2 (GIN indexes + views over Ponder-managed tables) is
        # applied by the indexer sidecar boot (src/offchainMigrations.ts).
        pnpm --filter @robbed/indexer migrate
        exec pnpm --filter @robbed/indexer exec ponder dev --hostname 0.0.0.0
    env_file:
      - path: .env
        required: false
    environment:
      <<: *dev-env
      # §12.55: explicit selection via the seam above; NO INDEXER_ALLOW_FORK_4663 here
      # (see service comment). Default 4663 = Phase-B value; INTERIM .env sets 46630.
      INDEXER_CHAIN_ID: ${MAINNET_INDEXER_CHAIN_ID:-4663}
      INDEXER_RPC_HTTP: ${MAINNET_RPC_URL:?MAINNET_RPC_URL is required — official Robinhood mainnet RPC (https://rpc.mainnet.chain.robinhood.com; CLAUDE.md chain facts). See docs/runbooks/docker.md 'Mainnet stack'.}
      # OPTIONAL (see header): empty ⇒ apps/indexer/src/config.ts maps INDEXER_RPC_WS
      # `|| undefined` ⇒ Ponder falls back to HTTP polling. Alchemy wss when a key exists;
      # never a sequencer feed.
      INDEXER_RPC_WS: ${MAINNET_RPC_WS_URL:-}
      DATABASE_URL: postgres://${POSTGRES_USER:-robbed}:${POSTGRES_PASSWORD:-robbed_dev_pw}@postgres:5432/${POSTGRES_DB:-robbed}
      REDIS_URL: redis://redis:6379
      METRICS_PORT: "9464"
      # MIRROR of docker-compose.yml — split-horizon metadata fetch (§8.3). This
      # staging stack still uses minio, so the stored metadata_uri is the BROWSER
      # base (host-mapped localhost:${MINIO_PORT}), unreachable from inside this
      # container. The verifier fetches content-addressed objects from the
      # internal base instead; the stored/displayed URL stays the public value.
      # R2_METADATA_BASE_URL is the internal fallback when a row carries no uri.
      # (When a real R2/CDN replaces minio, unset the rewrite — the CDN base is
      # reachable from everywhere; R2_METADATA_BASE_URL becomes the R2 base.)
      R2_METADATA_BASE_URL: http://minio:9000/${R2_BUCKET:-robbed-assets}/metadata
      METADATA_FETCH_REWRITE_FROM: http://localhost:${MINIO_PORT:-4290}/${R2_BUCKET:-robbed-assets}
      METADATA_FETCH_REWRITE_TO: http://minio:9000/${R2_BUCKET:-robbed-assets}
    ports:
      # 4229, NOT the 4269 pattern-default: the dev stack already binds 4269 for its
      # Ponder UI and all three stacks must be able to run simultaneously.
      - "${PONDER_PORT:-4229}:42069"
      - "${METRICS_HOST_PORT:-4264}:9464"
    depends_on:
      deps:
        condition: service_completed_successfully
      chaincheck:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # MIRROR (anti-drift): Ponder /ready == historical indexing complete. A long remote
      # backfill can exhaust these retries and show `unhealthy` while Ponder still works
      # through history — honest status, not a stack-file failure (restart is "no").
      test: ["CMD", "curl", "-sf", "http://localhost:42069/ready"]
      interval: 5s
      timeout: 5s
      retries: 36
      start_period: 90s
    restart: "no"

  # ── web — Next.js 16. MAINNET deltas: MOCK_DATA hard "false", browser RPC from env. ──
  web:
    <<: *dev-base
    command: ["pnpm", "--filter", "@robbed/web", "exec", "next", "dev", "-H", "0.0.0.0"]
    environment:
      <<: *dev-env
      # §12.55 chain-identity pattern applied to the web (mirror of the testnet stack): the
      # env var SELECTS the target chain, the shared deployment registry DEFINES it (apps/web
      # env.ts throws on a non-registry id). ONE source of truth with chaincheck: the id the
      # browser advertises to wallets is exactly the id chaincheck asserted the RPC serves
      # (INTERIM 46630; 4663 at Phase B — flips with root .env, no compose edit).
      NEXT_PUBLIC_CHAIN_ID: ${MAINNET_CHAIN_ID:?MAINNET_CHAIN_ID is required — asserted live by chaincheck and advertised as NEXT_PUBLIC_CHAIN_ID (INTERIM 46630; 4663 at Phase B). See docs/runbooks/docker.md 'Mainnet stack'.}
      # Public-origin overrides (Cloudflare Tunnel: robbed.fun → web, api.robbed.fun → api
      # with /ws → ws; see the cloudflared service below): browser-visible URLs must be
      # reachable from EXTERNAL browsers, so the MAINNET_PUBLIC_* env (root .env) overrides
      # the host-mapped localhost defaults. The public URLs also work for local browsing;
      # unset ⇒ localhost defaults, and port re-bases still flow via the nested ${*_PORT}.
      # R2 stays on the localhost default until minio gets a tunnel hostname or real R2
      # (same known limitation as the testnet stack — docker.md 'Public exposure').
      NEXT_PUBLIC_API_BASE_URL: ${MAINNET_PUBLIC_API_BASE_URL:-http://localhost:${API_PORT:-4201}}
      # MIRROR of the split-horizon API base: SSR (in-container) uses the service-DNS
      # api:3001; the browser keeps the public/host-mapped NEXT_PUBLIC_API_BASE_URL.
      API_BASE_URL_INTERNAL: http://api:3001
      NEXT_PUBLIC_WS_URL: ${MAINNET_PUBLIC_WS_URL:-ws://localhost:${WS_PORT:-4202}}
      NEXT_PUBLIC_R2_PUBLIC_BASE_URL: ${MAINNET_PUBLIC_R2_BASE_URL:-http://localhost:${MINIO_PORT:-4290}/${R2_BUCKET:-robbed-assets}}
      NEXT_PUBLIC_RPC_HTTP: ${MAINNET_RPC_URL:?MAINNET_RPC_URL is required — official Robinhood mainnet RPC (https://rpc.mainnet.chain.robinhood.com; CLAUDE.md chain facts). See docs/runbooks/docker.md 'Mainnet stack'.}
      # OPTIONAL (see header): empty tolerated by the web env layer (apps/web/src/shared/lib/
      # env.ts `rpcWs: … ?? ""`) — set the Alchemy wss when a key exists.
      NEXT_PUBLIC_RPC_WS: ${MAINNET_RPC_WS_URL:-}
      NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID:-}
      NEXT_PUBLIC_LARGE_VALUE_ETH_THRESHOLD: ${NEXT_PUBLIC_LARGE_VALUE_ETH_THRESHOLD:-}
      # MAINNET: never the mock fixture — this stack exists to exercise real chain data.
      NEXT_PUBLIC_MOCK_DATA: "false"
    volumes:
      - .:/workspace
      - robbed_pnpm_store:/pnpm-store
      - robbed_root_nm:/workspace/node_modules
      - robbed_api_nm:/workspace/apps/api/node_modules
      - robbed_indexer_nm:/workspace/apps/indexer/node_modules
      - robbed_web_nm:/workspace/apps/web/node_modules
      - robbed_shared_nm:/workspace/packages/shared/node_modules
      - robbed_web_next:/workspace/apps/web/.next
    ports:
      - "${WEB_PORT:-4200}:3000"
    depends_on:
      deps:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── MAINNET: cloudflared — Cloudflare Tunnel connector AS A COMPOSE SERVICE ──
  # MIRROR of the testnet cloudflared service (anti-drift) with the robbed-mainnet tunnel:
  # publishes robbed.fun / api.robbed.fun (+/ws) from INSIDE the stack network, so it
  # starts/stops with the stack (supersedes the host systemd user unit
  # cloudflared-robbed-mainnet.service). Ingress lives in-repo (NO secrets — the tunnel
  # UUID is routing metadata): tools/localstack/cloudflared/mainnet.yml, targeting
  # compose-internal service DNS (web:3000 / api:3001 / ws:3002 — never localhost, which
  # inside this container is the connector itself). Run CREDENTIALS stay on the host and
  # are bind-mounted read-only — never committed (docs/runbooks/docker.md "Public exposure").
  # Multiple connectors per tunnel are supported, so overlap with the (now decommissioned)
  # host unit during migration is safe. The ingress is chain-agnostic: the Phase-B swap
  # (header checklist) does not touch this service.
  cloudflared:
    # Pinned current stable (Docker Hub, published 2026-07-09; verified 2026-07-12).
    image: cloudflare/cloudflared:2026.7.1
    # Image ENTRYPOINT is ["cloudflared","--no-autoupdate"]; compose shell-lexes this
    # string into exec args (distroless image — there is no shell to invoke).
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    # The image's default user is distroless nonroot (65532), which cannot read the
    # 0600/0400 host credentials owned by the login user — run as that user instead.
    user: "${CLOUDFLARED_UID:-1000}:${CLOUDFLARED_GID:-1000}"
    volumes:
      - ./tools/localstack/cloudflared/mainnet.yml:/etc/cloudflared/config.yml:ro
      - ${CLOUDFLARED_DIR:-~/.cloudflared}/c80870d9-6ce5-40b6-a0d4-3e8e19b537b5.json:/etc/cloudflared/creds.json:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
      ws:
        condition: service_healthy
    restart: unless-stopped

# Same volume KEYS as the other stacks, but the `name: robbed-mainnet` project prefix makes them
# physically distinct (robbed-mainnet_robbed_pgdata vs robbed_/robbed-testnet_…) — mainnet state
# never mixes with the fork's or testnet's.
volumes:
  robbed_pgdata:
  robbed_redisdata:
  robbed_miniodata:
  robbed_pnpm_store:
  robbed_root_nm:
  robbed_api_nm:
  robbed_indexer_nm:
  robbed_web_nm:
  robbed_shared_nm:
  robbed_web_next:
